* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:#06060b; color:#e2e8f0; overflow:hidden; width:100vw; height:100vh; }
canvas { display:block; position:fixed; top:0; left:0; }
#overlay { position:fixed; top:0; left:0; width:100%; height:100%; display:none; align-items:center; justify-content:center; z-index:10; }
#overlay.visible { display:flex; }
.panel { background:rgba(6,6,11,0.97); border:2px solid #44ff88; border-radius:16px; padding:32px; max-width:480px; width:90%; text-align:center; }
.panel h2 { font-size:2rem; font-weight:900; color:#44ff88; margin-bottom:16px; text-shadow:0 0 12px #44ff88; }

.btn { display:inline-block; padding:12px 28px; border:none; border-radius:8px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; margin:6px; transition:all 0.15s; }
.btn-green { background:#44ff88; color:#06060b; }
.btn-green:hover { background:#88ffcc; box-shadow:0 0 16px #44ff88; }
.btn-blue { background:#44aaff; color:#06060b; }
.btn-blue:hover { background:#88ccff; box-shadow:0 0 16px #44aaff; }
.btn-gray { background:#334; color:#e2e8f0; }
.btn-gray:hover { background:#445; }
.error-msg { color:#ff4444; font-size:0.9rem; margin-top:8px; min-height:1.2em; }
#char-panel .classes { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
.class-card { border:2px solid #334; border-radius:12px; padding:16px 12px; cursor:pointer; width:130px; transition:all 0.15s; }
.class-card:hover { border-color:#888; }
.class-card.selected { box-shadow:0 0 20px currentColor; }
.class-card .class-icon { width:48px; height:48px; border-radius:50%; margin:0 auto 8px; }
.class-card .class-name { font-weight:800; font-size:0.95rem; margin-bottom:4px; }
.class-card .class-desc { font-size:0.72rem; color:#aaa; line-height:1.3; }
</style>
</head>

// ============================================================
// SEEDED RNG
// ============================================================
function mkRng(s){return()=>{s=Math.imul(48271,s)|0;return(s&0x7fffffff)/0x7fffffff;}}

// ============================================================
// WORLD GENERATION
// ============================================================
function genWorld(layer){
  const arr=new Uint8Array(WORLD_W*WORLD_H);
  const rng=mkRng(layer*7919+12345);
  const set=(x,y,t)=>{if(x>=0&&x<WORLD_W&&y>=0&&y<WORLD_H)arr[y*WORLD_W+x]=t;};
  const get=(x,y)=>{if(x<0||x>=WORLD_W||y<0||y>=WORLD_H)return T.WALL;return arr[y*WORLD_W+x];};

  if(layer===0){
    for(let i=0;i<arr.length;i++)arr[i]=T.GRASS;
    // dirt patches
    for(let n=0;n<80;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*4)+2;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r)set(x+dx,y+dy,T.DIRT);}
    // stone outcrops
    for(let n=0;n<40;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*3)+1;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r)set(x+dx,y+dy,T.STONE);}
    // rocks
    for(let n=0;n<25;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);set(x,y,T.ROCK);set(x+1,y,T.ROCK);set(x,y+1,T.ROCK);}
    // trees
    for(let n=0;n<60;n++){let x=Math.floor(rng()*(WORLD_W-2))+1,y=Math.floor(rng()*(WORLD_H-2))+1;set(x,y,T.TREE);}
    // border walls
    for(let x=0;x<WORLD_W;x++){set(x,0,T.WALL);set(x,WORLD_H-1,T.WALL);}
    for(let y=0;y<WORLD_H;y++){set(0,y,T.WALL);set(WORLD_W-1,y,T.WALL);}
    // stairs down
    set(50,55,T.STAIRS_D);
  } else if(layer===1){
    for(let i=0;i<arr.length;i++)arr[i]=T.CAVE_STONE;
    // carve open areas
    for(let n=0;n<50;n++){let cx=Math.floor(rng()*WORLD_W),cy=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*8)+4;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r)set(cx+dx,cy+dy,T.EMPTY);}
    // corridors
    for(let n=0;n<30;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H),len=Math.floor(rng()*20)+5,dir=rng()<0.5;for(let i=0;i<len;i++)dir?set(x+i,y,T.EMPTY):set(x,y+i,T.EMPTY);}
    // crystals
    for(let n=0;n<30;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);if(get(x,y)===T.CAVE_STONE)set(x,y,T.CRYSTAL);}
    // mushrooms
    for(let n=0;n<40;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);if(get(x,y)===T.EMPTY)set(x,y,T.MUSHROOM);}
    // pools
    for(let n=0;n<15;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*3)+1;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r&&get(x+dx,y+dy)===T.EMPTY)set(x+dx,y+dy,T.POOL);}
    for(let x=0;x<WORLD_W;x++){set(x,0,T.WALL);set(x,WORLD_H-1,T.WALL);}
    for(let y=0;y<WORLD_H;y++){set(0,y,T.WALL);set(WORLD_W-1,y,T.WALL);}
    set(50,58,T.STAIRS_D); set(30,5,T.STAIRS_U);
  } else if(layer===2){
    for(let i=0;i<arr.length;i++)arr[i]=T.DEEP_STONE;
    for(let n=0;n<40;n++){let cx=Math.floor(rng()*WORLD_W),cy=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*7)+3;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r)set(cx+dx,cy+dy,T.EMPTY);}
    for(let n=0;n<25;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);if(get(x,y)===T.DEEP_STONE)set(x,y,T.GEM);}
    // ruins structures
    for(let n=0;n<10;n++){let rx=Math.floor(rng()*WORLD_W),ry=Math.floor(rng()*WORLD_H),rw=Math.floor(rng()*6)+4,rh=Math.floor(rng()*5)+3;for(let dy=0;dy<rh;dy++)for(let dx=0;dx<rw;dx++)if(dy===0||dy===rh-1||dx===0||dx===rw-1)set(rx+dx,ry+dy,T.RUINS);}
    // echo crystals
    for(let n=0;n<20;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);if(get(x,y)===T.EMPTY)set(x,y,T.ECHO);}
    for(let x=0;x<WORLD_W;x++){set(x,0,T.WALL);set(x,WORLD_H-1,T.WALL);}
    for(let y=0;y<WORLD_H;y++){set(0,y,T.WALL);set(WORLD_W-1,y,T.WALL);}
    set(60,57,T.STAIRS_D); set(40,5,T.STAIRS_U);
  } else if(layer===3){
    for(let i=0;i<arr.length;i++)arr[i]=T.MAGMA;
    for(let n=0;n<35;n++){let cx=Math.floor(rng()*WORLD_W),cy=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*8)+3;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r)set(cx+dx,cy+dy,T.EMPTY);}
    // lava rivers
    for(let n=0;n<8;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);let cx=x,cy=y;for(let i=0;i<30;i++){set(cx,cy,T.LAVA);set(cx+1,cy,T.LAVA);cx+=Math.round(rng()*2-1);cy+=Math.round(rng()*2-1);cx=Math.max(1,Math.min(WORLD_W-2,cx));cy=Math.max(1,Math.min(WORLD_H-2,cy));}}
    // obsidian
    for(let n=0;n<30;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);if(get(x,y)===T.MAGMA)set(x,y,T.OBSIDIAN);}
    // fire vents
    for(let n=0;n<25;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);if(get(x,y)===T.EMPTY)set(x,y,T.VENT);}
    for(let x=0;x<WORLD_W;x++){set(x,0,T.WALL);set(x,WORLD_H-1,T.WALL);}
    for(let y=0;y<WORLD_H;y++){set(0,y,T.WALL);set(WORLD_W-1,y,T.WALL);}
    set(50,56,T.STAIRS_D); set(70,5,T.STAIRS_U);
  } else if(layer===4){
    for(let i=0;i<arr.length;i++)arr[i]=T.CORE;
    for(let n=0;n<30;n++){let cx=Math.floor(rng()*WORLD_W),cy=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*6)+3;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r)set(cx+dx,cy+dy,T.EMPTY);}
    // energy pillars
    for(let n=0;n<30;n++){let x=Math.floor(rng()*WORLD_W),y=Math.floor(rng()*WORLD_H);if(get(x,y)===T.EMPTY)set(x,y,T.ENERGY);}
    // void patches
    for(let n=0;n<20;n++){let cx=Math.floor(rng()*WORLD_W),cy=Math.floor(rng()*WORLD_H),r=Math.floor(rng()*4)+1;for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++)if(dx*dx+dy*dy<=r*r&&get(cx+dx,cy+dy)===T.EMPTY)set(cx+dx,cy+dy,T.VOID_T);}
    // altar in center
    set(50,30,T.ALTAR);
    for(let x=0;x<WORLD_W;x++){set(x,0,T.WALL);set(x,WORLD_H-1,T.WALL);}
    for(let y=0;y<WORLD_H;y++){set(0,y,T.WALL);set(WORLD_W-1,y,T.WALL);}
    // stairs up only
    set(50,5,T.STAIRS_U);
  }
  return arr;
}

function getWorld(layer){
  if(!worlds[layer])worlds[layer]=genWorld(layer);
  return worlds[layer];
}

function getTile(layer,x,y){
  if(x<0||x>=WORLD_W||y<0||y>=WORLD_H)return T.WALL;
  const key=`${layer}_${x}_${y}`;
  if(worldEdits[key]!==undefined)return worldEdits[key];
  return getWorld(layer)[y*WORLD_W+x];
}

function setTile(layer,x,y,t){
  worldEdits[`${layer}_${x}_${y}`]=t;
}

function tileAt(layer,px,py){
  return getTile(layer,Math.floor(px/TILE_SIZE),Math.floor(py/TILE_SIZE));
}

// PLAYER INIT
// ============================================================
function createPlayer(name,cls){
  const cd=CLASSES[cls];
  return {
    name,class:cls,level:1,xp:0,
    stats:{...cd.stats},
    x:50*TILE_SIZE+16,y:10*TILE_SIZE+16,
    layer:0,
    inventory:{},
    equippedParts:[],
    collectedParts:[],
    currentQuestId:QUESTS[cd.questline][0].id,
    questProgress:{},
    completedQuests:[],
    talentPoints:0,
    unlockedTalents:[],
    currentTool:null,
    miningPower:1,
    maxEquipSlots:4
  };
}

function loadPlayer(data){
  player=data;
  // ensure arrays exist
  if(!player.equippedParts)player.equippedParts=[];
  if(!player.collectedParts)player.collectedParts=[];
  if(!player.completedQuests)player.completedQuests=[];
  if(!player.unlockedTalents)player.unlockedTalents=[];
  if(!player.questProgress)player.questProgress={};
  if(!player.inventory)player.inventory={};
  if(!player.maxEquipSlots)player.maxEquipSlots=4;
}

// ============================================================
// COMPUTED STATS
// ============================================================
function computeStats(){
  const base={...player.stats};
  const pMult=hasTalent('e_mutate')?1.5:1;
  // apply equipped parts
  for(const pid of player.equippedParts){
    const part=findPartDef(pid);
    if(!part)continue;
    for(const[k,v]of Object.entries(part.bonus)){
      if(k==='atk')base.atk+=v*pMult;
      else if(k==='def')base.def+=v*pMult;
      else if(k==='spd')base.spd+=v*pMult;
      else if(k==='maxHp')base.maxHp+=v*pMult;
    }
  }
  // talent bonuses
  if(hasTalent('t_sharp'))base.atk*=1.15;
  if(hasTalent('t_tough'))base.def*=1.15;
  if(hasTalent('t_apex')){base.atk*=1.30;base.def*=1.30;}
  if(hasTalent('e_grow'))base.maxHp*=1.25;
  if(hasTalent('x_swift'))base.spd*=1.25;
  if(hasTalent('e_trans')){base.atk*=1.20;base.def*=1.20;base.spd*=1.20;base.maxHp*=1.20;}
  return base;
}

function hasTalent(id){return player.unlockedTalents&&player.unlockedTalents.includes(id);}

function findPartDef(pid){
  for(const md of Object.values(MONSTER_DEFS)){
    for(const p of md.parts)if(p.id===pid)return p;
  }
  return null;
}

function getMiningPower(){
  let mp=player.miningPower||1;
  if(hasTalent('x_dig'))mp+=2;
  return mp;
}

function getSaveData(){
  return {
    name:player.name,class:player.class,level:player.level,xp:player.xp,
    stats:player.stats,x:player.x,y:player.y,layer:player.layer,
    inventory:player.inventory,
    parts:{equipped:player.equippedParts,collected:player.collectedParts},
    quests:{current:player.currentQuestId,progress:player.questProgress,completed:player.completedQuests},
    talents:{unlocked:player.unlockedTalents,points:player.talentPoints},
    tool:player.currentTool,
    miningPower:player.miningPower||1,
    maxEquipSlots:player.maxEquipSlots||4,
    worldEdits
  };
}

async function saveGame(){
  const data=JSON.stringify(getSaveData());
  const key='slimester_'+player.name;
  try{if(window.AppDB)await window.AppDB.set(key,data);else localStorage.setItem(key,data);}catch(e){}
}

async function loadSave(name){
  const key='slimester_'+name;
  try{
    let data=window.AppDB?await window.AppDB.get(key):localStorage.getItem(key);
    if(!data)return null;
    return JSON.parse(typeof data==='string'?data:JSON.stringify(data));
  }catch(e){return null;}
}

async function tryNewPlayer(){
  const nm=document.getElementById('name-input').value.trim();
  if(!nm){document.getElementById('auth-error').textContent='Enter a name!';return;}
  document.getElementById('auth-error').textContent='';
  const existing=await loadSave(nm);
  if(existing){document.getElementById('auth-error').textContent='Name taken! Use Returning Player.';return;}
  // show char select
  document.getElementById('auth-panel').style.display='none';
  document.getElementById('char-panel').style.display='block';
  pendingName=nm;
}

async function tryReturning(){
  const nm=document.getElementById('name-input').value.trim();
  if(!nm){document.getElementById('auth-error').textContent='Enter a name!';return;}
  document.getElementById('auth-error').textContent='Checking...';
  const data=await loadSave(nm);
  if(!data){document.getElementById('auth-error').textContent='No save found for that name.';return;}
  // restore
  loadPlayer(data.name?data:{name:nm,...data});
  if(data.worldEdits)Object.assign(worldEdits,data.worldEdits);
  if(data.talents){player.unlockedTalents=data.talents.unlocked||[];player.talentPoints=data.talents.points||0;}
  if(data.quests){player.currentQuestId=data.quests.current;player.questProgress=data.quests.progress||{};player.completedQuests=data.quests.completed||[];}
  if(data.parts){player.equippedParts=data.parts.equipped||[];player.collectedParts=data.parts.collected||[];}
  player.miningPower=data.miningPower||1;
  player.maxEquipSlots=data.maxEquipSlots||4;
  hideOverlay();
  startGame();
}

// ============================================================
// MONSTER SPAWNING
// ============================================================
const LAYER_MONSTERS={
  0:['mud_golem','slime_beetle'],
  1:['stone_spider','cave_troll'],
  2:['crystal_wyrm'],
  3:['fire_salamander','magma_beast'],
  4:['core_guardian']
};

function spawnMonsters(){
  if(monsters.filter(m=>m.layer===player.layer).length>=MAX_MONSTERS)return;
  const pool=LAYER_MONSTERS[player.layer]||[];
  if(!pool.length)return;
  const key=pool[Math.floor(Math.random()*pool.length)];
  const def=MONSTER_DEFS[key];
  let attempts=0,mx,my;
  do{
    mx=player.x+(Math.random()*600-300);
    my=player.y+(Math.random()*600-300);
    attempts++;
  }while(attempts<20&&isSolid(player.layer,mx,my));
  if(attempts>=20)return;
  // deep clone parts with individual hp
  const mParts=def.parts.map(p=>({...p,curHp:p.hp}));
  monsters.push({
    id:Math.random(),type:key,def,layer:player.layer,
    x:mx,y:my,
    hp:def.hp,maxHp:def.hp,
    parts:mParts,
    attackCd:0,alive:true
  });
}

// ============================================================
// COLLISION
// ============================================================
function isSolid(layer,px,py){
  const tx=Math.floor(px/TILE_SIZE),ty=Math.floor(py/TILE_SIZE);
  const t=getTile(layer,tx,ty);
  return TILE_INFO[t]&&TILE_INFO[t].solid;
}

function checkCollision(layer,px,py,radius){
  radius=radius||12;
  const corners=[
    [px-radius,py-radius],[px+radius,py-radius],
    [px-radius,py+radius],[px+radius,py+radius]
  ];
  let dx=0,dy=0;
  for(const[cx,cy]of corners){
    if(isSolid(layer,cx,cy)){
      const tx=Math.floor(cx/TILE_SIZE),ty=Math.floor(cy/TILE_SIZE);
      const blockL=tx*TILE_SIZE,blockR=(tx+1)*TILE_SIZE;
      const blockT=ty*TILE_SIZE,blockB=(ty+1)*TILE_SIZE;
      if(px<blockL)dx=Math.min(dx,blockL-px-radius);
      else if(px>blockR)dx=Math.max(dx,blockR-px+radius);
      else if(py<blockT)dy=Math.min(dy,blockT-py-radius);
      else dy=Math.max(dy,blockB-py+radius);
    }
  }
  return{dx,dy};
}

function addParticle(x,y,color,count=5,speed=2){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const s=Math.random()*speed+0.5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*4+2,color,life:1,layer:player.layer});
  }
}

function addFloat(x,y,text,color='#ffff44'){
  floatNums.push({x,y,vy:-1.5,text,color,life:1,layer:player.layer});
}

function addXpGem(x,y,layer,amount){
  groundItems.push({id:Math.random(),type:'xp',x,y,layer,amount,r:6});
}

// ============================================================
// QUESTS
// ============================================================
function getCurrentQuest(){
  if(!player.currentQuestId)return null;
  for(const ql of Object.values(QUESTS))for(const q of ql)if(q.id===player.currentQuestId)return q;
  return null;
}

function questProgress(qid){return player.questProgress[qid]||0;}

function advanceQuest(q){
  if(!q)return;
  const xpGain=q.xp;
  gainXp(xpGain);
  player.completedQuests.push(q.id);
  if(q.next){player.currentQuestId=q.next;player.questProgress[q.next]=0;}
  else player.currentQuestId=null;
  addFloat(player.x,player.y-40,'Quest Complete!','#aaff44');
}

function onKill(monsterType){
  const q=getCurrentQuest();
  if(!q)return;
  if(q.goal.kill===monsterType){
    player.questProgress[q.id]=(player.questProgress[q.id]||0)+1;
    if(player.questProgress[q.id]>=q.goal.count)advanceQuest(q);
  }
}

function onCollect(itemId,amount=1){
  const q=getCurrentQuest();
  if(!q)return;
  if(q.goal.collect===itemId){
    player.questProgress[q.id]=(player.questProgress[q.id]||0)+amount;
    if(player.questProgress[q.id]>=q.goal.count)advanceQuest(q);
  }
}

function checkLayerQuest(layer){
  const q=getCurrentQuest();
  if(!q)return;
  if(q.goal.layer!==undefined&&q.goal.layer<=layer&&!(player.questProgress[q.id])){
    player.questProgress[q.id]=1;
    advanceQuest(q);
  }
}

function checkEquipQuest(){
  const q=getCurrentQuest();
  if(!q)return;
  if(q.goal.equip!==undefined&&player.equippedParts.length>=q.goal.equip&&!player.questProgress[q.id]){
    player.questProgress[q.id]=1;
    advanceQuest(q);
  }
}

// ============================================================
// XP / LEVEL UP
// ============================================================
function gainXp(amount){
  player.xp+=amount;
  const threshold=player.level*100;
  if(player.xp>=threshold){
    player.xp-=threshold;
    player.level++;
    player.stats.maxHp+=5;
    player.stats.hp=Math.min(player.stats.hp+5,player.stats.maxHp);
    player.stats.atk+=2;
    player.stats.def+=1;
    player.stats.spd+=0.2;
    if(player.level%3===0)player.talentPoints++;
    addFloat(player.x,player.y-60,'LEVEL UP!','#ffff44');
    addParticle(player.x,player.y,'#ffff44',15,3);
  }
}

// ============================================================
// COMBAT
// ============================================================
function attackMonster(m,partIdx){
  if(attackCooldown>0)return;
  attackCooldown=0.8;
  const cs=computeStats();
  let dmg=cs.atk+Math.floor(Math.random()*6)-Math.max(0,m.def);
  if(dmg<1)dmg=1;
  hitCombo++;
  if(hasTalent('t_combo')&&hitCombo%3===0)dmg*=2;
  // target specific part or body
  if(partIdx!==undefined&&partIdx>=0&&partIdx<m.parts.length){
    const part=m.parts[partIdx];
    if(part.curHp>0){
      part.curHp-=dmg;
      addFloat(m.x,m.y-m.def.size,'−'+dmg,'#ff4444');
      addParticle(m.x,m.y,m.def.color,4);
      if(part.curHp<=0){
        part.curHp=0;
        // drop part on ground
        groundItems.push({id:Math.random(),type:'part',partId:part.id,x:m.x+Math.random()*20-10,y:m.y+Math.random()*20-10,layer:m.layer,r:8,color:part.color,name:part.name});
        addFloat(m.x,m.y-30,'Part dropped!','#aaffaa');
      }
    }
  }
  m.hp-=dmg;
  if(m.hp<=0){killMonster(m);}
}

function killMonster(m){
  m.alive=false;
  addXpGem(m.x,m.y,m.layer,m.def.xp);
  // drop remaining parts
  for(const p of m.parts){
    if(p.curHp>0&&Math.random()<0.3){
      groundItems.push({id:Math.random(),type:'part',partId:p.id,x:m.x+Math.random()*30-15,y:m.y+Math.random()*30-15,layer:m.layer,r:8,color:p.color,name:p.name});
    }
  }
  addParticle(m.x,m.y,m.def.color,12,3);
  onKill(m.type);
}

function handleClick(cx,cy){
  if(screen==='title'){screen='auth';showAuth();return;}
  if(screen==='game'&&openPanel){
    handlePanelClick(cx,cy);
    return;
  }
  if(screen!=='game')return;
  // world click
  const wx=cx+camX, wy=cy+camY;
  // check monsters
  let hitMon=null,hitPart=-1;
  for(const m of monsters){
    if(!m.alive||m.layer!==player.layer)continue;
    const sx=m.x-camX,sy=m.y-camY;
    const dist=Math.hypot(cx-sx,cy-sy);
    if(dist<m.def.size+10){hitMon=m;break;}
    // check parts
    for(let pi=0;pi<m.parts.length;pi++){
      const pd=getPartPos(m,pi);
      const psx=pd.x-camX,psy=pd.y-camY;
      if(Math.hypot(cx-psx,cy-psy)<12){hitMon=m;hitPart=pi;break;}
    }
    if(hitMon)break;
  }
  if(hitMon&&Math.hypot(hitMon.x-player.x,hitMon.y-player.y)<200){
    attackMonster(hitMon,hitPart);
    return;
  }
  // check mining
  const tx=Math.floor(wx/TILE_SIZE),ty=Math.floor(wy/TILE_SIZE);
  const dist2=Math.hypot(wx-player.x,wy-player.y);
  if(dist2<80){
    const tile=getTile(player.layer,tx,ty);
    const info=TILE_INFO[tile];
    if(info&&info.mine){mineTarget={x:tx,y:ty,layer:player.layer};return;}
    // mushroom pick
    if(tile===T.MUSHROOM){addResource('mushroom',1);setTile(player.layer,tx,ty,T.EMPTY);addParticle(wx,wy,'#cc44aa',5);return;}
  }
  // move click
  moveTo(wx,wy);
}

let moveTarget=null;
function moveTo(wx,wy){moveTarget={x:wx,y:wy};}

function useItem(){
  // use health potion if available
  if((player.inventory.health_pot||0)>0){
    player.inventory.health_pot--;
    const cs=computeStats();
    player.stats.hp=Math.min(cs.maxHp,player.stats.hp+30);
    addFloat(player.x,player.y-40,'+30 HP','#44ff88');
  } else if((player.inventory.mega_pot||0)>0){
    player.inventory.mega_pot--;
    const cs=computeStats();
    player.stats.hp=Math.min(cs.maxHp,player.stats.hp+80);
    addFloat(player.x,player.y-40,'+80 HP','#44ff88');
  }
}

function addResource(key,count){
  player.inventory[key]=(player.inventory[key]||0)+count;
  onCollect(key,count);
}

// ============================================================
// PANEL CLICK HANDLING
// ============================================================
function handlePanelClick(cx,cy){
  // panels are drawn on canvas - we use hit regions stored per frame
  if(!panelHits)return;
  for(const hit of panelHits){
    if(cx>=hit.x&&cx<=hit.x+hit.w&&cy>=hit.y&&cy<=hit.y+hit.h){
      hit.action();
      return;
    }
  }
  // click outside closes panel
  const pw=Math.min(600,canvas.width-40),ph=Math.min(500,canvas.height-80);
  const px=(canvas.width-pw)/2,py=(canvas.height-ph)/2;
  if(cx<px||cx>px+pw||cy<py||cy>py+ph)openPanel=null;
}
let panelHits=[];

// ============================================================
// MINING
// ============================================================
function updateMining(dt){
  if(!mineTarget||!mouseDown)return;
  const{x:tx,y:ty,layer}=mineTarget;
  const tile=getTile(layer,tx,ty);
  const info=TILE_INFO[tile];
  if(!info||!info.mine){mineTarget=null;return;}
  const need=info.need||0;
  const omni=hasTalent('x_shape');
  if(!omni&&getMiningPower()<need+1&&!(need===0)){// can mine need:0 always
    if(need>0&&getMiningPower()<=need){addFloat(player.x,player.y-30,'Need better pickaxe!','#ff8888');mineTarget=null;return;}
  }
  const key=`${layer}_${tx}_${ty}`;
  if(tileHpMap[key]===undefined)tileHpMap[key]=info.hp;
  const spd=hasTalent('t_absorb')?1.5:1;
  const dmgPerSec=getMiningPower()*spd*3;
  mineProgress+=dt;
  if(mineProgress>=0.3){
    mineProgress=0;
    tileHpMap[key]-=getMiningPower();
    addParticle(tx*TILE_SIZE+16,ty*TILE_SIZE+16,info.color,3,1.5);
    if(tileHpMap[key]<=0){
      setTile(layer,tx,ty,T.EMPTY);
      delete tileHpMap[key];
      if(info.drop)addResource(info.drop,1);
      mineTarget=null;
    }
  }
}

// ============================================================
// UPDATE
// ============================================================
let lastAutoSave=0;
function update(dt){
  if(screen==='loading'){
    loadProgress+=dt/2;
    if(loadProgress>=1){loadProgress=1;screen='title';initTitleParticles();}
    return;
  }
  if(screen==='title'){
    for(const p of titleParticles){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;}
    return;
  }
  if(screen!=='game')return;
  if(openPanel)return;

  attackCooldown=Math.max(0,attackCooldown-dt);
  damageCooldown=Math.max(0,damageCooldown-dt);

  // movement
  const cs=computeStats();
  const spd=cs.spd*32*dt;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['KeyA'])dx-=spd;
  if(keys['ArrowRight']||keys['KeyD'])dx+=spd;
  if(keys['ArrowUp']||keys['KeyW'])dy-=spd;
  if(keys['ArrowDown']||keys['KeyS'])dy+=spd;

  // move target click
  if(moveTarget&&!dx&&!dy){
    const mdx=moveTarget.x-player.x,mdy=moveTarget.y-player.y;
    const md=Math.hypot(mdx,mdy);
    if(md<8){moveTarget=null;}
    else{const s=Math.min(spd,md);dx=mdx/md*s;dy=mdy/md*s;}
  }

  player.x+=dx;
  const c1=checkCollision(player.layer,player.x,player.y);
  player.x+=c1.dx;
  player.y+=dy;
  const c2=checkCollision(player.layer,player.x,player.y);
  player.y+=c2.dy;

  // camera lerp
  const targetCamX=player.x-canvas.width/2;
  const targetCamY=player.y-canvas.height/2;
  camX+=(targetCamX-camX)*0.1;
  camY+=(targetCamY-camY)*0.1;

  // tile damage
  const ptx=Math.floor(player.x/TILE_SIZE),pty=Math.floor(player.y/TILE_SIZE);
  const ptile=getTile(player.layer,ptx,pty);
  const pinfo=TILE_INFO[ptile];
  if(pinfo&&pinfo.damage&&damageCooldown<=0){
    player.stats.hp-=pinfo.damage;
    damageCooldown=1;
    addFloat(player.x,player.y-30,'-'+pinfo.damage,'#ff4444');
    if(player.stats.hp<=0)playerDied();
  }

  // stairs
  if(ptile===T.STAIRS_D){goDown();}
  else if(ptile===T.STAIRS_U){goUp();}

  // mining
  updateMining(dt);

  // monsters
  // try spawn
  if(Math.random()<0.01)spawnMonsters();
  for(const m of monsters){
    if(!m.alive||m.layer!==player.layer)continue;
    const mdist=Math.hypot(m.x-player.x,m.y-player.y);
    // despawn if too far
    if(mdist>700){m.alive=false;continue;}
    // move toward player
    if(mdist>m.def.size+20){
      const ang=Math.atan2(player.y-m.y,player.x-m.x);
      const mspd=m.def.spd*24*dt;
      m.x+=Math.cos(ang)*mspd;m.y+=Math.sin(ang)*mspd;
    }
    // attack player
    m.attackCd=Math.max(0,m.attackCd-dt);
    if(mdist<m.def.size+24&&m.attackCd<=0){
      m.attackCd=1.5;
      const dmg=Math.max(1,m.def.atk-cs.def);
      player.stats.hp-=dmg;
      addFloat(player.x,player.y-30,'-'+dmg,'#ff4444');
      addParticle(player.x,player.y,'#ff4444',5);
      if(player.stats.hp<=0)playerDied();
    }
  }
  monsters=monsters.filter(m=>m.alive);

  // ground item pickup
  for(let i=groundItems.length-1;i>=0;i--){
    const gi=groundItems[i];
    if(gi.layer!==player.layer)continue;
    if(Math.hypot(gi.x-player.x,gi.y-player.y)<24){
      if(gi.type==='xp'){gainXp(gi.amount);addParticle(gi.x,gi.y,'#aa44ff',5);}
      else if(gi.type==='part'){
        player.collectedParts.push(gi.partId);
        addFloat(player.x,player.y-40,'Got '+gi.name+'!','#aaffaa');
        onCollect(gi.partId,1);
      }
      groundItems.splice(i,1);
    }
  }

  // particles
  for(const p of particles){p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life-=dt*1.5;}
  particles=particles.filter(p=>p.life>0&&p.layer===player.layer);

  // float nums
  for(const f of floatNums){f.y+=f.vy;f.life-=dt*1.2;}
  floatNums=floatNums.filter(f=>f.life>0);

  // auto save
  lastAutoSave+=dt;
  if(lastAutoSave>30){lastAutoSave=0;saveGame();}
}

// ============================================================
// STAIRS
// ============================================================
let stairCooldown=0;
function goDown(){
  if(stairCooldown>0)return;
  if(player.layer>=4)return;
  stairCooldown=2;
  player.layer++;
  // find up stairs
  const w=getWorld(player.layer);
  placeAtStairs(player.layer,'up');
  monsters=[];
  groundItems=groundItems.filter(g=>g.layer!==player.layer);
  checkLayerQuest(player.layer);
  setTimeout(()=>{stairCooldown=0;},2000);
}

function goUp(){
  if(stairCooldown>0)return;
  if(player.layer<=0)return;
  stairCooldown=2;
  player.layer--;
  placeAtStairs(player.layer,'down');
  monsters=[];
  setTimeout(()=>{stairCooldown=0;},2000);
}

function placeAtStairs(layer,type){
  const w=getWorld(layer);
  const target=type==='up'?T.STAIRS_U:T.STAIRS_D;
  for(let y=0;y<WORLD_H;y++)for(let x=0;x<WORLD_W;x++){
    const k=`${layer}_${x}_${y}`;
    const t=worldEdits[k]!==undefined?worldEdits[k]:w[y*WORLD_W+x];
    if(t===target){player.x=x*TILE_SIZE+16;player.y=y*TILE_SIZE+16;return;}
  }
  player.x=playerSpawnX[layer];player.y=playerSpawnY[layer];
}

// ============================================================
// PLAYER DEATH
// ============================================================
function playerDied(){
  const cs=computeStats();
  player.stats.hp=Math.floor(cs.maxHp*0.5);
  player.layer=0;player.x=50*TILE_SIZE+16;player.y=10*TILE_SIZE+16;
  player.xp=Math.floor(player.xp*0.7);
  monsters=[];
  addFloat(player.x,player.y-80,'YOU DIED','#ff2222');
  screen='died';
  setTimeout(()=>{screen='game';},2000);
}

// ============================================================
// PART POSITION HELPERS
// ============================================================
function getPartPos(m,partIdx){
  const part=m.parts[partIdx];
  const offsets={arm:[-m.def.size-4,0],shell:[0,0],head:[0,-m.def.size-4],eye:[m.def.size*0.4,-m.def.size*0.3],wing:[-m.def.size,m.def.size*0.3],leg:[0,m.def.size+4],body:[0,0]};
  const off=offsets[part.pos]||[0,0];
  return{x:m.x+off[0],y:m.y+off[1]};
}

// ============================================================
// RENDER
// ============================================================
let gameTime=0;
function render(dt){
  gameTime+=dt||0.016;
  ctx.fillStyle='#06060b';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(screen==='loading'){renderLoading();return;}
  if(screen==='title'){renderTitle();return;}
  if(screen==='game'||screen==='died'){renderGame();if(screen==='died')renderDeathOverlay();return;}
}

// ============================================================
// LOADING SCREEN
// ============================================================
function renderLoading(){
  const cx=canvas.width/2,cy=canvas.height/2;
  // bouncing slime
  const bY=Math.abs(Math.sin(gameTime*3))*40;
  drawSlime(cx,cy-60-bY,28,'#44ff88','#88ffcc',gameTime);
  // title
  ctx.save();
  ctx.font='bold 64px Nunito';
  ctx.textAlign='center';
  ctx.shadowColor='#44ff88';ctx.shadowBlur=30;
  ctx.fillStyle='#44ff88';
  ctx.fillText('SLIMESTER',cx,cy+30);
  ctx.restore();
  // loading text
  ctx.fillStyle='#aaa';ctx.font='20px Nunito';ctx.textAlign='center';
  ctx.fillText('LOADING...',cx,cy+70);
  // progress bar
  const bw=300,bh=16,bx=cx-150,by=cy+90;
  ctx.strokeStyle='#334';ctx.lineWidth=2;
  ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#44ff88';
  ctx.fillRect(bx,by,bw*loadProgress,bh);
}

// ============================================================
// TITLE SCREEN
// ============================================================
function renderTitle(){
  // particles
  for(const p of titleParticles){
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
  const cx=canvas.width/2,cy=canvas.height/2;
  // logo
  const pulse=Math.sin(gameTime*2)*0.15+1;
  ctx.save();
  ctx.translate(cx,cy-60);ctx.scale(pulse,pulse);
  ctx.font='bold 72px Nunito';ctx.textAlign='center';
  ctx.shadowColor='#44ff88';ctx.shadowBlur=40;
  ctx.fillStyle='#44ff88';
  ctx.fillText('SLIMESTER',0,0);
  ctx.restore();
  ctx.fillStyle='#88ffcc';ctx.font='24px Nunito';ctx.textAlign='center';
  ctx.fillText('A Sandbox RPG',cx,cy+10);
  // blink
  if(Math.floor(gameTime*2)%2===0){
    ctx.fillStyle='#e2e8f0';ctx.font='18px Nunito';
    ctx.fillText('PRESS ANY KEY TO CONTINUE',cx,cy+80);
  }
}

// ============================================================
// GAME RENDER
// ============================================================
function renderGame(){
  ctx.save();
  ctx.translate(-camX,-camY);

  // tiles
  const startTX=Math.floor(camX/TILE_SIZE)-1;
  const startTY=Math.floor(camY/TILE_SIZE)-1;
  const endTX=startTX+Math.ceil(canvas.width/TILE_SIZE)+2;
  const endTY=startTY+Math.ceil(canvas.height/TILE_SIZE)+2;

  for(let ty=startTY;ty<endTY;ty++){
    for(let tx=startTX;tx<endTX;tx++){
      if(tx<0||tx>=WORLD_W||ty<0||ty>=WORLD_H)continue;
      const tile=getTile(player.layer,tx,ty);
      const info=TILE_INFO[tile];
      if(!info)continue;
      const px=tx*TILE_SIZE,py=ty*TILE_SIZE;
      // ore sense glow
      if(hasTalent('x_sense')&&(tile===T.CRYSTAL||tile===T.GEM||tile===T.ECHO||tile===T.ENERGY)){
        ctx.save();ctx.shadowColor=info.color;ctx.shadowBlur=12;
        ctx.fillStyle=info.color;ctx.fillRect(px,py,TILE_SIZE,TILE_SIZE);
        ctx.restore();continue;
      }
      // draw tile
      if(info.solid){
        // 3D depth
        const dark=shadeColor(info.color,-40);
        ctx.fillStyle=dark;ctx.fillRect(px+2,py+4,TILE_SIZE,TILE_SIZE);
      }
      ctx.fillStyle=info.color;ctx.fillRect(px,py,TILE_SIZE,TILE_SIZE);
      // stairs indicator
      if(tile===T.STAIRS_D){drawStairsD(px,py);}
      else if(tile===T.STAIRS_U){drawStairsU(px,py);}
      else if(tile===T.ALTAR){drawAltar(px,py);}
      else if(tile===T.ENERGY){
        ctx.save();ctx.globalAlpha=0.6+Math.sin(gameTime*3)*0.3;
        ctx.fillStyle='#00ffaa';ctx.fillRect(px,py,TILE_SIZE,TILE_SIZE);
        ctx.restore();
      }
      else if(tile===T.LAVA||tile===T.VENT){
        ctx.save();ctx.globalAlpha=0.7+Math.sin(gameTime*4+tx+ty)*0.2;
        ctx.fillStyle=info.color;ctx.fillRect(px,py,TILE_SIZE,TILE_SIZE);
        ctx.restore();
      }
      // mine progress
      const mk=`${player.layer}_${tx}_${ty}`;
      if(tileHpMap[mk]!==undefined&&info.hp){
        const pct=1-tileHpMap[mk]/info.hp;
        ctx.fillStyle=`rgba(255,255,255,${pct*0.6})`;
        ctx.fillRect(px,py+TILE_SIZE-4,TILE_SIZE*pct,4);
      }
    }
  }

  // mine target highlight
  if(mineTarget){
    ctx.strokeStyle='#ffffff';ctx.lineWidth=2;ctx.globalAlpha=0.5+Math.sin(gameTime*8)*0.3;
    ctx.strokeRect(mineTarget.x*TILE_SIZE,mineTarget.y*TILE_SIZE,TILE_SIZE,TILE_SIZE);
    ctx.globalAlpha=1;
  }

  // ground items
  for(const gi of groundItems){
    if(gi.layer!==player.layer)continue;
    if(gi.type==='xp'){
      ctx.save();ctx.shadowColor='#aa44ff';ctx.shadowBlur=8;
      ctx.fillStyle='#aa44ff';ctx.beginPath();
      ctx.arc(gi.x,gi.y,gi.r,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else if(gi.type==='part'){
      ctx.save();ctx.shadowColor=gi.color;ctx.shadowBlur=6;
      ctx.fillStyle=gi.color;ctx.beginPath();
      const s=gi.r;
      ctx.moveTo(gi.x,gi.y-s);ctx.lineTo(gi.x+s,gi.y);ctx.lineTo(gi.x,gi.y+s);ctx.lineTo(gi.x-s,gi.y);
      ctx.closePath();ctx.fill();
      ctx.restore();
      ctx.fillStyle='#fff';ctx.font='9px Nunito';ctx.textAlign='center';
      ctx.fillText(gi.name,gi.x,gi.y-gi.r-2);
    }
  }

  // other players
  for(const[sid,op] of Object.entries(otherPlayers)){
    if(op.layer!==player.layer)continue;
    const cls=CLASSES[op.class]||CLASSES.acid;
    ctx.globalAlpha=0.6;
    drawSlime(op.x,op.y,18,cls.color,cls.glowColor,gameTime);
    ctx.globalAlpha=1;
    ctx.fillStyle='#e2e8f0';ctx.font='11px Nunito';ctx.textAlign='center';
    ctx.fillText(op.name,op.x,op.y-24);
  }

  // monsters
  for(const m of monsters){
    if(!m.alive||m.layer!==player.layer)continue;
    renderMonster(m);
  }

  // player
  const pcls=CLASSES[player.class];
  const hasAura=hasTalent('e_trans');
  if(hasAura){ctx.save();ctx.shadowColor=pcls.glowColor;ctx.shadowBlur=30;}
  drawSlimeWithParts(player.x,player.y,player.class,player.equippedParts,gameTime);
  if(hasAura)ctx.restore();

  // particles
  for(const p of particles){
    ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // float nums
  for(const f of floatNums){
    ctx.save();ctx.globalAlpha=f.life;ctx.fillStyle=f.color;
    ctx.font='bold 14px Nunito';ctx.textAlign='center';
    ctx.shadowColor=f.color;ctx.shadowBlur=6;
    ctx.fillText(f.text,f.x,f.y);
    ctx.restore();
  }

  ctx.restore(); // end camera transform

  // HUD
  renderHUD();
  // panels
  if(openPanel)renderPanel();
}

// ============================================================
// SLIME DRAWING
// ============================================================
function drawSlime(x,y,r,color,glowColor,t){
  const squish=Math.sin(t*4)*0.08;
  const rx=r*(1-squish),ry=r*(1+squish);
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(x+2,y+r+2,rx*0.8,4,0,0,Math.PI*2);ctx.fill();
  // body
  ctx.save();ctx.shadowColor=glowColor||color;ctx.shadowBlur=15;
  ctx.fillStyle=color;
  ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // eyes
  const eyeOff=rx*0.35;
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(x-eyeOff,y-ry*0.2,rx*0.22,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+eyeOff,y-ry*0.2,rx*0.22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(x-eyeOff+1,y-ry*0.2+1,rx*0.11,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+eyeOff+1,y-ry*0.2+1,rx*0.11,0,Math.PI*2);ctx.fill();
}

function drawSlimeWithParts(x,y,cls,equippedParts,t){
  const cd=CLASSES[cls];
  const evolved=hasTalent('e_form');
  const r=evolved?22:18;
  // draw equipped parts behind
  for(const pid of equippedParts){
    const pd=findPartDef(pid);
    if(!pd)continue;
    drawEquippedPart(x,y,r,pd,t);
  }
  // draw slime body
  drawSlime(x,y,r,cd.color,cd.glowColor,t);
  // draw equipped parts front
  for(const pid of equippedParts){
    const pd=findPartDef(pid);
    if(!pd)continue;
    drawEquippedPartFront(x,y,r,pd,t);
  }
}

function drawEquippedPart(x,y,r,part,t){
  ctx.save();
  switch(part.pos){
    case 'shell':
      ctx.strokeStyle=part.color;ctx.lineWidth=3;ctx.globalAlpha=0.6;
      ctx.shadowColor=part.color;ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(x,y,r+8,r+8,0,0,Math.PI*2);ctx.stroke();
      break;
    case 'wing':
      ctx.fillStyle=part.color;ctx.globalAlpha=0.5;
      ctx.beginPath();ctx.ellipse(x-r-6,y,8,14,Math.PI*0.3+Math.sin(t*3)*0.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(x+r+6,y,8,14,-Math.PI*0.3-Math.sin(t*3)*0.1,0,Math.PI*2);ctx.fill();
      break;
    case 'leg':
      ctx.fillStyle=part.color;ctx.globalAlpha=0.8;
      for(let i=-1;i<=1;i+=2){
        ctx.beginPath();ctx.ellipse(x+i*r*0.5,y+r+4,4,8,0,0,Math.PI*2);ctx.fill();
      }
      break;
  }
  ctx.restore();
}

function drawEquippedPartFront(x,y,r,part,t){
  ctx.save();
  switch(part.pos){
    case 'arm':
      ctx.fillStyle=part.color;ctx.shadowColor=part.color;ctx.shadowBlur=6;
      ctx.beginPath();ctx.ellipse(x-r-8,y+4,7,5,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(x+r+8,y+4,7,5,0,0,Math.PI*2);ctx.fill();
      break;
    case 'head':
      ctx.fillStyle=part.color;ctx.shadowColor=part.color;ctx.shadowBlur=6;
      ctx.beginPath();ctx.arc(x,y-r-6,6,0,Math.PI*2);ctx.fill();
      break;
    case 'eye':
      ctx.fillStyle=part.color;ctx.shadowColor=part.color;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(x,y-r*0.5,4,0,Math.PI*2);ctx.fill();
      break;
    case 'body':
      ctx.strokeStyle=part.color;ctx.lineWidth=2;ctx.globalAlpha=0.4;
      ctx.beginPath();ctx.ellipse(x,y,r-2,r-2,0,0,Math.PI*2);ctx.stroke();
      break;
  }
  ctx.restore();
}

// ============================================================
// MONSTER RENDERING
// ============================================================
function renderMonster(m){
  const d=m.def;
  // body
  ctx.save();
  ctx.shadowColor=d.color;ctx.shadowBlur=10;
  ctx.fillStyle=d.color;
  ctx.beginPath();ctx.arc(m.x,m.y,d.size,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // parts
  for(let pi=0;pi<m.parts.length;pi++){
    const p=m.parts[pi];
    if(p.curHp<=0)continue;
    const pos=getPartPos(m,pi);
    ctx.save();ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=5;
    ctx.beginPath();ctx.arc(pos.x,pos.y,6,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // part hp bar
    const pw=16,ph=3;
    const bx=pos.x-pw/2,by=pos.y-10;
    ctx.fillStyle='#222';ctx.fillRect(bx,by,pw,ph);
    ctx.fillStyle=p.color;ctx.fillRect(bx,by,pw*(p.curHp/p.hp),ph);
  }
  // hp bar above
  const bw=d.size*2+10,bh=5;
  const bx=m.x-bw/2,by=m.y-d.size-12;
  ctx.fillStyle='#220000';ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='#ff3333';ctx.fillRect(bx,by,bw*(m.hp/m.maxHp),bh);
  // name
  ctx.fillStyle='#e2e8f0';ctx.font='10px Nunito';ctx.textAlign='center';
  ctx.fillText(d.name,m.x,by-3);
}

function drawStairsD(px,py){
  ctx.fillStyle='#ffcc44';ctx.font='18px serif';ctx.textAlign='center';
  ctx.fillText('▼',px+16,py+22);
}
function drawStairsU(px,py){
  ctx.fillStyle='#44ccff';ctx.font='18px serif';ctx.textAlign='center';
  ctx.fillText('▲',px+16,py+22);
}
function drawAltar(px,py){
  ctx.save();ctx.shadowColor='#aaff44';ctx.shadowBlur=20;
  ctx.fillStyle='#aaff44';ctx.font='20px serif';ctx.textAlign='center';
  ctx.fillText('✦',px+16,py+22);
  ctx.restore();
}

// ============================================================
// HUD
// ============================================================
function renderHUD(){
  const cs=computeStats();
  ctx.font='13px Nunito';ctx.textAlign='left';

  // top-left: layer + name
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(8,8,200,44);
  ctx.fillStyle='#e2e8f0';ctx.font='bold 14px Nunito';
  ctx.fillText(LAYERS[player.layer],14,26);
  ctx.fillStyle=CLASSES[player.class].color;ctx.font='13px Nunito';
  ctx.fillText(player.name+' (Lv '+player.level+')',14,44);

  // bottom-left: hp + xp bars
  const barW=200,barH=12;
  const bx=10,by=canvas.height-70;
  // hp
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx-2,by-2,barW+4,barH+4);
  ctx.fillStyle='#440000';ctx.fillRect(bx,by,barW,barH);
  ctx.fillStyle='#ff3333';ctx.fillRect(bx,by,barW*(player.stats.hp/cs.maxHp),barH);
  ctx.fillStyle='#fff';ctx.font='10px Nunito';ctx.textAlign='left';
  ctx.fillText(`HP: ${Math.floor(player.stats.hp)}/${Math.floor(cs.maxHp)}`,bx+4,by+9);
  // xp
  const xpY=by+18;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(bx-2,xpY-2,barW+4,barH+4);
  ctx.fillStyle='#220044';ctx.fillRect(bx,xpY,barW,barH);
  ctx.fillStyle='#aa44ff';ctx.fillRect(bx,xpY,barW*(player.xp/(player.level*100)),barH);
  ctx.fillStyle='#fff';ctx.font='10px Nunito';ctx.fillText(`XP: ${player.xp}/${player.level*100}`,bx+4,xpY+9);
  // talent points
  if(player.talentPoints>0){
    ctx.fillStyle='#ffff44';ctx.font='bold 11px Nunito';
    ctx.fillText(`★ ${player.talentPoints} Talent Point${player.talentPoints>1?'s':''}`,bx,xpY+22);
  }

  // bottom-right: quest + tool
  const q=getCurrentQuest();
  if(q){
    const qx=canvas.width-220,qy=canvas.height-80;
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(qx-4,qy-4,216,70);
    ctx.fillStyle='#aaff44';ctx.font='bold 11px Nunito';ctx.textAlign='left';
    ctx.fillText('QUEST: '+q.title,qx,qy+10);
    ctx.fillStyle='#aaa';ctx.font='10px Nunito';
    ctx.fillText(q.desc,qx,qy+24);
    const prog=player.questProgress[q.id]||0;
    if(q.goal.count){ctx.fillStyle='#e2e8f0';ctx.fillText(`Progress: ${prog}/${q.goal.count}`,qx,qy+38);}
    else if(q.goal.layer!==undefined){ctx.fillStyle='#e2e8f0';ctx.fillText(`Go to layer ${q.goal.layer+1}`,qx,qy+38);}
    else if(q.goal.equip!==undefined){ctx.fillStyle='#e2e8f0';ctx.fillText(`Equip ${q.goal.equip} parts (${player.equippedParts.length})`,qx,qy+38);}
    ctx.fillStyle='#888';ctx.font='10px Nunito';
    ctx.fillText('Tool: '+(player.currentTool||'Bare Hands'),qx,qy+52);
  }

  // top-right: player count + minimap
  const playerCount=1+Object.values(otherPlayers).filter(op=>op.layer===player.layer).length;
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(canvas.width-100,8,92,24);
  ctx.fillStyle='#e2e8f0';ctx.font='12px Nunito';ctx.textAlign='right';
  ctx.fillText('Players: '+playerCount,canvas.width-12,24);

  // minimap
  const mmW=80,mmH=48,mmX=canvas.width-mmW-8,mmY=36;
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(mmX,mmY,mmW,mmH);
  const scaleX=mmW/WORLD_W,scaleY=mmH/WORLD_H;
  // draw player dot
  const pdotX=mmX+Math.floor(player.x/TILE_SIZE)*scaleX;
  const pdotY=mmY+Math.floor(player.y/TILE_SIZE)*scaleY;
  ctx.fillStyle=CLASSES[player.class].color;
  ctx.fillRect(pdotX-1,pdotY-1,3,3);
  // monsters
  ctx.fillStyle='#ff4444';
  for(const m of monsters){
    if(m.layer!==player.layer)continue;
    const mx2=mmX+Math.floor(m.x/TILE_SIZE)*scaleX;
    const my2=mmY+Math.floor(m.y/TILE_SIZE)*scaleY;
    ctx.fillRect(mx2,my2,2,2);
  }
  // stairs
  ctx.fillStyle='#ffcc44';
  for(let ty=0;ty<WORLD_H;ty++)for(let tx=0;tx<WORLD_W;tx++){
    const tile=getTile(player.layer,tx,ty);
    if(tile===T.STAIRS_D||tile===T.STAIRS_U){ctx.fillRect(mmX+tx*scaleX,mmY+ty*scaleY,2,2);}
  }

  // key hints bottom center
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(canvas.width/2-180,canvas.height-20,360,18);
  ctx.fillStyle='#666';ctx.font='11px Nunito';ctx.textAlign='center';
  ctx.fillText('[I]nventory [Q]uests [T]alents [C]raft [E]Use Item [ESC]Close',canvas.width/2,canvas.height-6);
}

// ============================================================
// PANELS
// ============================================================
function renderPanel(){
  panelHits=[];
  const pw=Math.min(600,canvas.width-40),ph=Math.min(500,canvas.height-80);
  const px=(canvas.width-pw)/2,py=(canvas.height-ph)/2;
  // bg
  ctx.fillStyle='rgba(6,6,11,0.95)';ctx.fillRect(px,py,pw,ph);
  ctx.strokeStyle='#44ff88';ctx.lineWidth=2;ctx.strokeRect(px,py,pw,ph);
  // close hint
  ctx.fillStyle='#555';ctx.font='11px Nunito';ctx.textAlign='right';
  ctx.fillText('[ESC] Close',px+pw-10,py+16);

  if(openPanel==='inv')renderInvPanel(px,py,pw,ph);
  else if(openPanel==='quest')renderQuestPanel(px,py,pw,ph);
  else if(openPanel==='talent')renderTalentPanel(px,py,pw,ph);
  else if(openPanel==='craft')renderCraftPanel(px,py,pw,ph);
}

function renderInvPanel(px,py,pw,ph){
  ctx.fillStyle='#44ff88';ctx.font='bold 18px Nunito';ctx.textAlign='center';
  ctx.fillText('Inventory & Parts',px+pw/2,py+30);

  const half=pw/2-20;
  // left: resources
  ctx.fillStyle='#aaa';ctx.font='bold 13px Nunito';ctx.textAlign='left';
  ctx.fillText('Resources:',px+14,py+54);
  let iy=py+72;
  const inv=player.inventory;
  const keys2=Object.keys(inv).filter(k=>k!=='health_pot'&&k!=='mega_pot');
  const pots=Object.keys(inv).filter(k=>k==='health_pot'||k==='mega_pot');
  const allKeys=[...keys2,...pots];
  for(const k of allKeys){
    if(!inv[k])continue;
    ctx.fillStyle='#e2e8f0';ctx.font='12px Nunito';
    ctx.fillText(`${k.replace(/_/g,' ')}: ${inv[k]}`,px+14,iy);
    iy+=18;if(iy>py+ph-60)break;
  }

  // right: parts
  ctx.fillStyle='#aaa';ctx.font='bold 13px Nunito';ctx.textAlign='left';
  ctx.fillText('Collected Parts:',px+pw/2+6,py+54);
  const slots=player.maxEquipSlots+(hasTalent('e_slots')?1:0);
  ctx.fillStyle='#777';ctx.font='11px Nunito';
  ctx.fillText(`Equipped: ${player.equippedParts.length}/${slots}`,px+pw/2+6,py+68);

  let ry=py+84;
  const unique=[...new Set(player.collectedParts)];
  for(const pid of unique){
    const pd=findPartDef(pid);if(!pd)continue;
    const equipped=player.equippedParts.includes(pid);
    const count=player.collectedParts.filter(p=>p===pid).length;
    ctx.fillStyle=equipped?'#44ff88':'#e2e8f0';
    ctx.font='12px Nunito';ctx.textAlign='left';
    const label=`${pd.name} x${count}${equipped?' [E]':''}`;
    ctx.fillText(label,px+pw/2+6,ry);
    // click region
    panelHits.push({x:px+pw/2+6,y:ry-14,w:half-10,h:16,action:()=>toggleEquip(pid)});
    ry+=18;if(ry>py+ph-40)break;
  }
  if(unique.length===0){ctx.fillStyle='#555';ctx.font='12px Nunito';ctx.fillText('No parts collected yet.',px+pw/2+6,ry);}
}

function toggleEquip(pid){
  const slots=player.maxEquipSlots+(hasTalent('e_slots')?1:0);
  const idx=player.equippedParts.indexOf(pid);
  if(idx>=0){player.equippedParts.splice(idx,1);}
  else if(player.equippedParts.length<slots){player.equippedParts.push(pid);checkEquipQuest();}
  else{addFloat(player.x,player.y-40,'Slots full!','#ff8888');}
}

function renderQuestPanel(px,py,pw,ph){
  ctx.fillStyle='#aaff44';ctx.font='bold 18px Nunito';ctx.textAlign='center';
  ctx.fillText('Quest Log',px+pw/2,py+30);

  const q=getCurrentQuest();
  let qy=py+55;
  if(q){
    ctx.fillStyle='#aaff44';ctx.font='bold 14px Nunito';ctx.textAlign='left';
    ctx.fillText('► '+q.title,px+16,qy);qy+=20;
    ctx.fillStyle='#e2e8f0';ctx.font='12px Nunito';
    ctx.fillText(q.desc,px+16,qy);qy+=18;
    const prog=player.questProgress[q.id]||0;
    if(q.goal.count){ctx.fillStyle='#aaa';ctx.fillText(`Progress: ${prog}/${q.goal.count}`,px+16,qy);qy+=18;}
    ctx.fillStyle='#ffcc44';ctx.fillText('Reward: '+q.xp+' XP',px+16,qy);qy+=28;
  } else {
    ctx.fillStyle='#555';ctx.font='14px Nunito';ctx.textAlign='center';
    ctx.fillText('All quests complete!',px+pw/2,qy);qy+=28;
  }
  ctx.fillStyle='#888';ctx.font='bold 13px Nunito';ctx.textAlign='left';
  ctx.fillText('Completed:',px+16,qy);qy+=18;
  for(const cid of player.completedQuests){
    let found=null;
    for(const ql of Object.values(QUESTS))for(const qq of ql)if(qq.id===cid)found=qq;
    if(!found)continue;
    ctx.fillStyle='#555';ctx.font='12px Nunito';ctx.fillText('✓ '+found.title,px+16,qy);qy+=16;
    if(qy>py+ph-20)break;
  }
}

function renderTalentPanel(px,py,pw,ph){
  ctx.fillStyle='#ffcc44';ctx.font='bold 18px Nunito';ctx.textAlign='center';
  ctx.fillText('Talent Tree',px+pw/2,py+30);
  ctx.fillStyle='#e2e8f0';ctx.font='13px Nunito';
  ctx.fillText(`Points: ${player.talentPoints}`,px+pw/2,py+48);

  const cols=['combat','evolution','exploration'];
  const colW=(pw-40)/3;
  const colColors={'combat':'#ff6644','evolution':'#44ff88','exploration':'#44aaff'};
  const colNames={'combat':'Combat','evolution':'Evolution','exploration':'Exploration'};

  for(let ci=0;ci<3;ci++){
    const cx=px+20+ci*colW;
    const col=cols[ci];
    ctx.fillStyle=colColors[col];ctx.font='bold 12px Nunito';ctx.textAlign='center';
    ctx.fillText(colNames[col],cx+colW/2,py+66);
    const talents=TALENT_TREE[col];
    for(let ti=0;ti<talents.length;ti++){
      const t=talents[ti];
      const ty2=py+82+ti*72;
      const unlocked=hasTalent(t.id);
      const canUnlock=!unlocked&&player.talentPoints>=t.cost&&(ti===0||hasTalent(talents[ti-1].id));
      // connector line
      if(ti>0){ctx.strokeStyle=hasTalent(talents[ti-1].id)?colColors[col]:'#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx+colW/2,ty2-10);ctx.lineTo(cx+colW/2,ty2);ctx.stroke();}
      ctx.fillStyle=unlocked?colColors[col]:canUnlock?'#334':' #1a1a2e';
      ctx.strokeStyle=unlocked?colColors[col]:canUnlock?'#556':'#222';
      ctx.lineWidth=1.5;
      roundRect(ctx,cx+4,ty2,colW-8,60,8,true,true);
      ctx.fillStyle=unlocked?'#111':canUnlock?'#e2e8f0':'#444';
      ctx.font='bold 11px Nunito';ctx.textAlign='center';
      ctx.fillText(t.name,cx+colW/2,ty2+16);
      ctx.fillStyle=unlocked?'#333':canUnlock?'#aaa':'#333';
      ctx.font='10px Nunito';
      wrapText(ctx,t.desc,cx+colW/2,ty2+30,colW-12,12);
      ctx.fillStyle=unlocked?'#44ff88':canUnlock?'#ffcc44':'#555';
      ctx.font='10px Nunito';
      ctx.fillText(unlocked?'Unlocked':'Cost: '+t.cost,cx+colW/2,ty2+52);
      if(canUnlock){
        panelHits.push({x:cx+4,y:ty2,w:colW-8,h:60,action:()=>unlockTalent(t,col,ti)});
      }
    }
  }
}

function unlockTalent(t,col,idx){
  if(player.talentPoints<t.cost)return;
  const talents=TALENT_TREE[col];
  if(idx>0&&!hasTalent(talents[idx-1].id))return;
  player.talentPoints-=t.cost;
  player.unlockedTalents.push(t.id);
  if(t.bonus.slots)player.maxEquipSlots++;
  addFloat(player.x,player.y-60,'Talent Unlocked!','#ffcc44');
}

function renderCraftPanel(px,py,pw,ph){
  ctx.fillStyle='#44aaff';ctx.font='bold 18px Nunito';ctx.textAlign='center';
  ctx.fillText('Crafting',px+pw/2,py+30);

  let cy2=py+52;
  for(const r of RECIPES){
    const canCraft=canCraftRecipe(r);
    // bg
    ctx.fillStyle=canCraft?'rgba(0,80,40,0.5)':'rgba(20,20,30,0.5)';
    ctx.fillRect(px+12,cy2-16,pw-24,52);
    ctx.strokeStyle=canCraft?'#44ff88':'#333';ctx.lineWidth=1;
    ctx.strokeRect(px+12,cy2-16,pw-24,52);
    // name
    ctx.fillStyle=canCraft?'#44ff88':'#888';ctx.font='bold 13px Nunito';ctx.textAlign='left';
    ctx.fillText(r.icon+' '+r.name,px+20,cy2);
    // ingredients
    const ingStr=Object.entries(r.ing).map(([k,v])=>`${k.replace(/_/g,' ')}×${v}`).join(', ');
    ctx.fillStyle='#aaa';ctx.font='11px Nunito';
    ctx.fillText('Needs: '+ingStr,px+20,cy2+16);
    // what it does
    let effect='';
    if(r.minePower)effect=`Mining Power: ${r.minePower}`;
    else if(r.heal)effect=`Heal: ${r.heal} HP`;
    ctx.fillStyle='#777';ctx.fillText(effect,px+20,cy2+30);
    // craft button
    if(canCraft){
      ctx.fillStyle='#44ff88';ctx.font='bold 12px Nunito';ctx.textAlign='right';
      ctx.fillText('[CRAFT]',px+pw-20,cy2);
      panelHits.push({x:px+pw-80,y:cy2-14,w:70,h:20,action:()=>craftItem(r)});
    }
    cy2+=60;
    if(cy2>py+ph-20)break;
  }
}

function canCraftRecipe(r){
  for(const[k,v]of Object.entries(r.ing)){if((player.inventory[k]||0)<v)return false;}
  return true;
}

function craftItem(r){
  if(!canCraftRecipe(r))return;
  for(const[k,v]of Object.entries(r.ing))player.inventory[k]-=v;
  if(r.consumable){
    player.inventory[r.id]=(player.inventory[r.id]||0)+1;
    addFloat(player.x,player.y-40,'Crafted '+r.name,'#44aaff');
  } else if(r.minePower){
    player.currentTool=r.name;
    player.miningPower=r.minePower;
    addFloat(player.x,player.y-40,'Equipped '+r.name,'#44aaff');
  }
}

// ============================================================
// DEATH OVERLAY
// ============================================================
function renderDeathOverlay(){
  ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.save();ctx.shadowColor='#ff2222';ctx.shadowBlur=40;
  ctx.fillStyle='#ff2222';ctx.font='bold 72px Nunito';ctx.textAlign='center';
  ctx.fillText('YOU DIED',canvas.width/2,canvas.height/2);
  ctx.restore();
  ctx.fillStyle='#aaa';ctx.font='20px Nunito';ctx.textAlign='center';
  ctx.fillText('Respawning...',canvas.width/2,canvas.height/2+50);
}

// ============================================================
// HELPERS
// ============================================================
function shadeColor(hex,amt){
  let r=parseInt(hex.slice(1,3),16)+amt,g=parseInt(hex.slice(3,5),16)+amt,b=parseInt(hex.slice(5,7),16)+amt;
  r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));
  return '#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}

function roundRect(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(fill)ctx.fill();if(stroke)ctx.stroke();
}

function wrapText(ctx,text,cx,y,maxW,lineH){
  const words=text.split(' ');let line='';
  for(const w of words){const test=line+w+' ';if(ctx.measureText(test).width>maxW&&line){ctx.fillText(line,cx,y);line=w+' ';y+=lineH;}else line=test;}
  if(line)ctx.fillText(line,cx,y);
}

// ============================================================
// MAIN LOOP
// ============================================================
let lastTime=0;
function gameLoop(timestamp){
  const dt=Math.min((timestamp-lastTime)/1000,0.1);
  lastTime=timestamp;
  update(dt);
  render(dt);
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);

// Touch stair cooldown reset
setInterval(()=>{if(stairCooldown>0)stairCooldown=Math.max(0,stairCooldown-0.1);},100);
</script>
