<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawsNet</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0c0c14;
            --bg-subtle: #10101a;
            --surface: rgba(255,255,255,0.03);
            --surface-2: rgba(255,255,255,0.05);
            --surface-3: rgba(255,255,255,0.07);
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.1);
            --text: #b0b4c0;
            --text-2: #636878;
            --text-3: #363a4a;
            --white: #e8eaf0;
            --coral: #e8614d;
            --coral-dim: rgba(232,97,77,0.1);
            --seafoam: #4ecdc4;
            --seafoam-dim: rgba(78,205,196,0.1);
            --green: #22c55e;
            --telegram: #b0b4c0;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 45% at 25% 0%, rgba(232,97,77,0.025) 0%, transparent 50%),
                radial-gradient(ellipse 60% 45% at 80% 100%, rgba(78,205,196,0.02) 0%, transparent 50%);
        }
        .container { max-width: 600px; margin: 0 auto; padding: 0 1.25rem; position: relative; z-index: 1; }

        /* HEADER */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(12,12,20,0.92); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.25rem;
        }
        .header-inner {
            max-width: 600px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-weight: 300; font-size: 1.1rem; letter-spacing: -0.02em; color: var(--white); }
        .logo .logo-mark {
            display: inline-flex; align-items: center; justify-content: center;
            width: 26px; height: 26px; background: var(--coral);
            color: #fff; font-weight: 800; font-size: 0.55rem;
            letter-spacing: 0; margin-right: 0.5rem; vertical-align: middle;
            text-transform: uppercase; border-radius: 4px;
        }
        .logo span { color: var(--text-2); font-weight: 300; }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .tg-btn {
            display: inline-flex; align-items: center; gap: 0.4rem;
            background: transparent; color: var(--text-2); border: 1px solid var(--border);
            border-radius: 0; padding: 0.4rem 0.9rem; font-size: 0.6rem; font-weight: 600;
            font-family: inherit; cursor: pointer; text-decoration: none;
            letter-spacing: 0.1em; text-transform: uppercase;
            transition: color 0.15s, border-color 0.15s;
        }
        .tg-btn:hover { color: var(--white); border-color: var(--border-hover); }
        .tg-icon { width: 12px; height: 12px; }

        /* TABS */
        .tabs {
            display: flex;
            background: rgba(12,12,20,0.92); backdrop-filter: blur(16px);
            position: sticky; top: 53px; z-index: 99;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            flex: 1; padding: 0.85rem 0; text-align: center;
            font-size: 0.6rem; font-weight: 600; color: var(--text-3);
            cursor: pointer; border-bottom: 1px solid transparent;
            transition: color 0.15s, border-color 0.15s;
            text-transform: uppercase; letter-spacing: 0.14em;
        }
        .tab.active { color: var(--white); border-bottom-color: var(--coral); }
        .tab:hover { color: var(--text); }

        /* PANELS */
        .panel { display: none; }
        .panel.active { display: block; }

        /* TELEGRAM PANEL */
        .tg-feed { padding: 0.5rem 0; }
        .tg-msg {
            border-bottom: 1px solid var(--border); padding: 1rem 0;
        }
        .tg-msg:last-child { border-bottom: none; }
        .tg-msg-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.35rem; }
        .tg-msg-avatar {
            width: 30px; height: 30px; border-radius: 4px;
            background: var(--coral-dim); color: var(--coral);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.62rem; flex-shrink: 0;
        }
        .tg-msg-name { font-weight: 600; font-size: 0.76rem; color: var(--white); letter-spacing: 0.02em; }
        .tg-msg-username { font-size: 0.62rem; color: var(--text-3); }
        .tg-msg-time { font-size: 0.6rem; color: var(--text-3); letter-spacing: 0.04em; }
        .tg-msg-body { font-size: 0.84rem; color: var(--text); line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
        .tg-msg-reply-ctx {
            border-left: 2px solid var(--coral-dim); padding: 0.25rem 0.6rem;
            margin-bottom: 0.4rem; font-size: 0.72rem; color: var(--text-2);
        }
        .tg-msg-reply-ctx .rname { color: var(--coral); font-weight: 600; }
        .tg-msg-actions { margin-top: 0.5rem; }
        .tg-reply-row { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
        .tg-source-badge {
            display: inline-block; font-size: 0.5rem; color: var(--text-3);
            letter-spacing: 0.08em; text-transform: uppercase; margin-left: 0.5rem;
            background: var(--surface-2); padding: 0.15rem 0.4rem; border-radius: 2px;
            vertical-align: middle;
        }
        .tg-compose {
            border-bottom: 1px solid var(--border); padding: 1rem 0;
        }
        .tg-compose-row { display: flex; gap: 0.5rem; }
        .tg-compose-input {
            flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border);
            border-radius: 0; padding: 0.5rem 0; color: var(--text);
            font-family: inherit; font-size: 0.82rem; font-weight: 400;
            transition: border-color 0.15s;
        }
        .tg-compose-input:focus { outline: none; border-color: rgba(232,97,77,0.3); }
        .tg-compose-input::placeholder { color: var(--text-3); }
        .tg-notice {
            text-align: center; padding: 1rem;
            font-size: 0.68rem; color: var(--text-3); line-height: 1.8;
            letter-spacing: 0.02em;
        }
        .tg-notice a { color: var(--text); text-decoration: none; font-weight: 600; border-bottom: 1px solid var(--border); padding-bottom: 1px; }
        .tg-notice a:hover { color: var(--white); border-color: var(--white); }
        .tg-loading { text-align: center; padding: 3rem 1rem; color: var(--text-3); font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase; }
        .tg-edited { font-size: 0.52rem; color: var(--text-3); margin-left: 0.3rem; font-style: italic; }

        /* COMMUNITY FEED */
        .compose {
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 0; margin: 0;
        }
        .compose-row { display: flex; gap: 0.75rem; align-items: flex-start; }
        .compose-avatar {
            width: 36px; height: 36px; border-radius: 4px;
            background: var(--seafoam-dim); color: var(--seafoam);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.7rem; flex-shrink: 0;
        }
        .compose-input {
            flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border);
            border-radius: 0; padding: 0.5rem 0; color: var(--text);
            font-family: inherit; font-size: 0.82rem; resize: none;
            min-height: 38px; max-height: 120px; line-height: 1.5;
            font-weight: 400; letter-spacing: 0.005em;
            transition: border-color 0.15s;
        }
        .compose-input:focus { outline: none; border-color: rgba(78,205,196,0.3); }
        .compose-input::placeholder { color: var(--text-3); font-weight: 400; }
        .compose-footer { display: flex; justify-content: flex-end; margin-top: 0.75rem; }
        .btn {
            border: none; border-radius: 4px; padding: 0.5rem 1.25rem;
            font-family: inherit; font-size: 0.6rem; font-weight: 600;
            cursor: pointer; transition: opacity 0.15s;
            letter-spacing: 0.1em; text-transform: uppercase;
        }
        .btn:hover { opacity: 0.7; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }
        .btn-primary { background: var(--coral); color: #fff; }
        .btn-ghost { background: transparent; color: var(--text-2); border: 1px solid var(--border); }

        /* POST CARD */
        .post {
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 0;
            transition: none;
            background: transparent; border-radius: 0;
        }
        .post:hover { background: transparent; }
        .post:last-child { border-bottom: none; }
        .post-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
        .post-avatar {
            width: 30px; height: 30px; border-radius: 4px;
            background: var(--seafoam-dim); color: var(--seafoam);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.62rem; flex-shrink: 0;
        }
        .post-name { font-weight: 600; font-size: 0.76rem; color: var(--white); letter-spacing: 0.02em; }
        .post-time { font-size: 0.6rem; color: var(--text-3); font-weight: 400; letter-spacing: 0.04em; }
        .post-body {
            font-size: 0.84rem; color: var(--text); line-height: 1.65;
            margin-bottom: 0.75rem; white-space: pre-wrap; word-break: break-word;
            font-weight: 400;
        }
        .post-actions { display: flex; gap: 1.5rem; }
        .post-action {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.6rem; color: var(--text-3); cursor: pointer;
            background: none; border: none; font-family: inherit;
            transition: color 0.15s; padding: 0; letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        .post-action:hover { color: var(--text); }
        .post-action.liked { color: var(--coral); }
        .post-action .count { font-weight: 700; }

        /* REPLIES */
        .replies { margin-top: 0.75rem; padding-top: 0.75rem; border-top: 1px solid var(--border); }
        .reply { display: flex; gap: 0.5rem; padding: 0.4rem 0; }
        .reply-avatar {
            width: 22px; height: 22px; border-radius: 0;
            background: var(--surface-2); color: var(--text-3);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.5rem; flex-shrink: 0;
        }
        .reply-content { flex: 1; }
        .reply-name { font-weight: 600; font-size: 0.66rem; color: var(--text-2); letter-spacing: 0.02em; }
        .reply-text { font-size: 0.76rem; color: var(--text); line-height: 1.5; font-weight: 400; }
        .reply-time { font-size: 0.56rem; color: var(--text-3); letter-spacing: 0.04em; }
        .reply-input-row { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
        .reply-input {
            flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--border);
            border-radius: 0; padding: 0.4rem 0; color: var(--text);
            font-family: inherit; font-size: 0.76rem; font-weight: 400;
            transition: border-color 0.15s;
        }
        .reply-input:focus { outline: none; border-color: rgba(78,205,196,0.3); }
        .reply-input::placeholder { color: var(--text-3); }
        .reply-send {
            background: var(--coral); color: #fff; border: none; border-radius: 4px;
            padding: 0.4rem 0.75rem; font-family: inherit; font-size: 0.56rem;
            font-weight: 600; cursor: pointer; letter-spacing: 0.1em;
            text-transform: uppercase; transition: opacity 0.15s;
        }
        .reply-send:hover { opacity: 0.7; }

        /* ONLINE USERS */
        .online-bar {
            display: flex; gap: 0.75rem; padding: 1rem 0 0.5rem;
            overflow-x: auto; scrollbar-width: none;
            border-bottom: 1px solid var(--border);
        }
        .online-bar:empty { display: none; }
        .online-bar::-webkit-scrollbar { display: none; }
        .online-dot { width: 42px; text-align: center; flex-shrink: 0; }
        .online-dot-avatar {
            width: 34px; height: 34px; border-radius: 4px;
            background: var(--seafoam-dim); color: var(--seafoam);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.6rem; margin: 0 auto;
            position: relative;
        }
        .online-dot-avatar::after {
            content: ''; position: absolute; bottom: -2px; right: -2px;
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--seafoam); border: 2px solid var(--bg);
        }
        .online-dot-name {
            font-size: 0.52rem; color: var(--text-3); margin-top: 0.25rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            letter-spacing: 0.04em; text-transform: uppercase;
        }

        /* EMPTY STATE */
        .empty { text-align: center; padding: 5rem 1.5rem; color: var(--text-3); }
        .empty-title {
            font-size: 0.8rem; font-weight: 300; margin-bottom: 0.5rem;
            color: var(--text-2); letter-spacing: 0.06em; text-transform: uppercase;
        }
        .empty-desc { font-size: 0.7rem; font-weight: 400; letter-spacing: 0.02em; }

        /* NAME MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 200;
            background: rgba(10,10,12,0.85); backdrop-filter: blur(8px);
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 0; padding: 2.5rem; width: 100%; max-width: 340px;
        }
        .modal-title {
            font-weight: 300; font-size: 0.95rem; margin-bottom: 0.5rem;
            color: var(--white); letter-spacing: 0.08em; text-transform: uppercase;
        }
        .modal-input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border);
            border-radius: 0; padding: 0.7rem 0; color: var(--text);
            font-family: inherit; font-size: 0.82rem; margin-bottom: 1.25rem;
            font-weight: 400; transition: border-color 0.15s;
        }
        .modal-input:focus { outline: none; border-color: rgba(78,205,196,0.3); }

        /* TOAST */
        .toast {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            background: var(--surface-3); color: var(--white);
            border: 1px solid var(--border); border-radius: 4px;
            padding: 0.55rem 1.5rem; font-size: 0.62rem; font-weight: 600;
            z-index: 300; opacity: 0; transition: opacity 0.2s; pointer-events: none;
            letter-spacing: 0.08em; text-transform: uppercase;
        }
        .toast.show { opacity: 1; }

        @media (max-width: 480px) {
            .container { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-inner">
            <div class="logo"><span class="logo-mark">Cn</span>Claws<span>Net</span></div>
            <div class="header-actions">
                <a href="https://t.me/inclawbate" target="_blank" rel="noopener" class="tg-btn">
                    <svg class="tg-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0h-.056zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
                    Join Telegram
                </a>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" data-panel="community" onclick="switchTab(this)">Community</div>
        <div class="tab" data-panel="telegram" onclick="switchTab(this)">Telegram</div>
    </div>

    <div class="container">
        <!-- COMMUNITY PANEL -->
        <div class="panel active" id="panel-community">
            <div id="onlineBar" class="online-bar"></div>
            <div class="compose">
                <div class="compose-row">
                    <div class="compose-avatar" id="composeAvatar">?</div>
                    <textarea class="compose-input" id="composeInput" placeholder="Share something with the community..." rows="1" oninput="autoGrow(this)"></textarea>
                </div>
                <div class="compose-footer">
                    <button class="btn btn-primary" id="postBtn" onclick="submitPost()">Post</button>
                </div>
            </div>
            <div id="feedList"></div>
        </div>

        <!-- TELEGRAM PANEL -->
        <div class="panel" id="panel-telegram">
            <div class="tg-notice">
                Live feed from the <a href="https://t.me/inclawbate" target="_blank">Inclawbate Telegram</a> group — messages sync both ways.
            </div>
            <div class="tg-compose" id="tgCompose" style="display:none">
                <div class="tg-compose-row">
                    <input class="tg-compose-input" id="tgComposeInput" placeholder="Send a message to Telegram..." maxlength="1000" onkeydown="if(event.key==='Enter')sendToTelegram()">
                    <button class="reply-send" onclick="sendToTelegram()">Send</button>
                </div>
            </div>
            <div id="tgFeed" class="tg-feed">
                <div class="tg-loading">Loading messages...</div>
            </div>
        </div>
    </div>

    <!-- NAME SETUP MODAL -->
    <div class="modal-overlay" id="nameModal">
        <div class="modal">
            <div class="modal-title">Welcome to ClawsNet</div>
            <div style="font-size:0.72rem;color:var(--text-2);margin-bottom:1.5rem;line-height:1.7;font-weight:400;letter-spacing:0.02em">Pick a display name to join the conversation.</div>
            <input class="modal-input" id="nameInput" placeholder="Display name" maxlength="24" autofocus>
            <button class="btn btn-primary" style="width:100%" onclick="saveName()">Join Community</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var STORAGE_KEY = 'clawsnet_data';
        var GLOBAL_FEED_KEY = 'clawsnet_feed_v1';
        var TG_API = 'https://www.inclawbate.com/api/inclawbate/telegram-messages';
        var me = loadUser();
        var posts = [];
        var tgMessages = [];
        var tgLastTimestamp = 0;
        var tgReplyTo = null;
        var realtimeReady = false;

        function loadUser() {
            try { var r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
            return null;
        }
        function saveUser() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(me));
            if (window.AppDB) window.AppDB.set('clawsnet_user', me).catch(function(){});
        }

        function toast(msg) {
            var el = document.getElementById('toast');
            el.textContent = msg; el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 2200);
        }

        function getInitials(name) {
            if (!name) return '?';
            var parts = name.trim().split(/\s+/);
            return parts.length > 1 ? (parts[0][0] + parts[1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
        }

        function timeAgo(iso) {
            var diff = (Date.now() - new Date(iso).getTime()) / 1000;
            if (diff < 60) return 'now';
            if (diff < 3600) return Math.floor(diff/60) + 'm';
            if (diff < 86400) return Math.floor(diff/3600) + 'h';
            return Math.floor(diff/86400) + 'd';
        }

        function escapeHtml(str) {
            var d = document.createElement('div'); d.textContent = str || ''; return d.innerHTML;
        }

        function autoGrow(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        // --- NAME SETUP ---
        function checkName() {
            if (!me || !me.name) {
                document.getElementById('nameModal').classList.add('open');
                return false;
            }
            document.getElementById('composeAvatar').textContent = getInitials(me.name);
            return true;
        }

        function saveName() {
            var name = document.getElementById('nameInput').value.trim();
            if (!name || name.length < 2) { toast('Name must be at least 2 characters'); return; }
            var wallet = null;
            try {
                var match = document.cookie.match(/inclawbate_token=([^;]+)/);
                if (match) {
                    var payload = JSON.parse(atob(decodeURIComponent(match[1]).split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
                    wallet = payload.wallet_address || null;
                }
            } catch(e) {}
            me = { name: name, id: 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6), wallet: wallet, createdAt: new Date().toISOString() };
            saveUser();
            document.getElementById('nameModal').classList.remove('open');
            document.getElementById('composeAvatar').textContent = getInitials(me.name);
            toast('Welcome, ' + name);
            connectRealtime();
        }

        // --- TABS ---
        function switchTab(el) {
            document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
            el.classList.add('active');
            var panel = document.getElementById('panel-' + el.dataset.panel);
            panel.classList.add('active');
            if (el.dataset.panel === 'telegram') loadTelegram();
        }

        var tgLoaded = false;
        var tgPollInterval = null;
        function loadTelegram() {
            if (tgLoaded) return;
            tgLoaded = true;
            if (me) document.getElementById('tgCompose').style.display = 'block';
            fetchTelegramMessages();
            tgPollInterval = setInterval(fetchTelegramMessages, 15000);
        }

        async function fetchTelegramMessages() {
            try {
                var url = TG_API + '?limit=50';
                if (tgLastTimestamp && tgMessages.length) url = TG_API + '?since=' + tgLastTimestamp;
                var resp = await fetch(url);
                var data = await resp.json();
                if (!data.ok || !data.messages) return;
                if (tgLastTimestamp && tgMessages.length) {
                    data.messages.forEach(function(m) {
                        if (!tgMessages.find(function(ex) { return ex.id === m.id; })) tgMessages.push(m);
                        else {
                            var idx = tgMessages.findIndex(function(ex) { return ex.id === m.id; });
                            if (idx >= 0) tgMessages[idx] = m;
                        }
                    });
                } else {
                    tgMessages = data.messages;
                }
                if (tgMessages.length) tgLastTimestamp = Math.max.apply(null, tgMessages.map(function(m) { return m.timestamp; }));
                renderTelegram();
            } catch(e) {
                var el = document.getElementById('tgFeed');
                if (!tgMessages.length) el.innerHTML = '<div class="tg-loading">Could not load messages</div>';
            }
        }

        function renderTelegram() {
            var el = document.getElementById('tgFeed');
            if (!tgMessages.length) {
                el.innerHTML = '<div class="empty"><div class="empty-title">No messages yet</div><div class="empty-desc">Messages from Telegram will appear here</div></div>';
                return;
            }
            var sorted = tgMessages.slice().sort(function(a, b) { return b.timestamp - a.timestamp; });
            el.innerHTML = sorted.map(function(m) {
                var replyHtml = '';
                if (m.replyTo) {
                    replyHtml = '<div class="tg-msg-reply-ctx"><span class="rname">' + escapeHtml(m.replyTo.name) + '</span> ' + escapeHtml((m.replyTo.text || '').slice(0, 80)) + '</div>';
                }
                var editedHtml = m.edited ? '<span class="tg-edited">edited</span>' : '';
                var usernameHtml = m.from.username ? '<span class="tg-msg-username">@' + escapeHtml(m.from.username) + '</span>' : '';
                return '<div class="tg-msg">' +
                    '<div class="tg-msg-header">' +
                        '<div class="tg-msg-avatar">' + escapeHtml(getInitials(m.from.name)) + '</div>' +
                        '<div><div class="tg-msg-name">' + escapeHtml(m.from.name) + ' ' + usernameHtml + '<span class="tg-source-badge">Telegram</span></div>' +
                        '<div class="tg-msg-time">' + timeAgo(new Date(m.timestamp).toISOString()) + editedHtml + '</div></div>' +
                    '</div>' +
                    replyHtml +
                    '<div class="tg-msg-body">' + escapeHtml(m.text) + '</div>' +
                    '<div class="tg-msg-actions"><button class="post-action" onclick="replyToTelegram(' + m.id + ', \'' + escapeHtml(m.from.name).replace(/'/g, "\\'") + '\')">&#8617; Reply</button></div>' +
                '</div>';
            }).join('');
        }

        function replyToTelegram(msgId, name) {
            if (!checkName()) return;
            tgReplyTo = msgId;
            var input = document.getElementById('tgComposeInput');
            input.placeholder = 'Replying to ' + name + '...';
            input.focus();
            document.getElementById('tgCompose').style.display = 'block';
        }

        async function sendToTelegram() {
            if (!checkName()) return;
            var input = document.getElementById('tgComposeInput');
            var text = input.value.trim();
            if (!text) return;
            try {
                var body = { text: text, senderName: me.name };
                if (tgReplyTo) body.replyToId = tgReplyTo;
                var resp = await fetch(TG_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                var data = await resp.json();
                if (data.ok) {
                    input.value = '';
                    input.placeholder = 'Send a message to Telegram...';
                    tgReplyTo = null;
                    toast('Sent to Telegram');
                    setTimeout(fetchTelegramMessages, 1500);
                } else {
                    toast(data.error || 'Failed to send');
                }
            } catch(e) {
                toast('Failed to send message');
            }
        }

        // --- FEED ---
        async function loadFeed() {
            if (window.AppDB) {
                try {
                    var cloud = await window.AppDB.getGlobal(GLOBAL_FEED_KEY);
                    if (cloud && Array.isArray(cloud)) posts = cloud;
                } catch(e) {}
            }
            renderFeed();
        }

        function saveFeed() {
            if (window.AppDB) window.AppDB.setGlobal(GLOBAL_FEED_KEY, posts).catch(function(){});
        }

        function renderFeed() {
            var el = document.getElementById('feedList');
            if (!posts.length) {
                el.innerHTML = '<div class="empty"><div class="empty-title">No posts yet</div><div class="empty-desc">Be the first to say something</div></div>';
                return;
            }
            el.innerHTML = posts.map(function(p, idx) {
                var liked = me && p.likes && p.likes.indexOf(me.id) >= 0;
                var likeCount = (p.likes || []).length;
                var replyCount = (p.replies || []).length;
                var repliesHtml = '';
                if (p.replies && p.replies.length) {
                    repliesHtml = '<div class="replies">' + p.replies.map(function(r) {
                        return '<div class="reply"><div class="reply-avatar">' + escapeHtml(getInitials(r.name)) + '</div><div class="reply-content"><span class="reply-name">' + escapeHtml(r.name) + '</span> <span class="reply-time">' + timeAgo(r.time) + '</span><div class="reply-text">' + escapeHtml(r.text) + '</div></div></div>';
                    }).join('') + '</div>';
                }
                return '<div class="post" data-idx="' + idx + '">' +
                    '<div class="post-header"><div class="post-avatar">' + escapeHtml(getInitials(p.name)) + '</div><div><div class="post-name">' + escapeHtml(p.name) + '</div><div class="post-time">' + timeAgo(p.time) + '</div></div></div>' +
                    '<div class="post-body">' + escapeHtml(p.text) + '</div>' +
                    '<div class="post-actions">' +
                        '<button class="post-action' + (liked ? ' liked' : '') + '" onclick="toggleLike(' + idx + ')">' + (liked ? '&#9829;' : '&#9825;') + ' <span class="count">' + (likeCount || '') + '</span></button>' +
                        '<button class="post-action" onclick="toggleReplyBox(' + idx + ')">&#8617; <span class="count">' + (replyCount || '') + '</span></button>' +
                    '</div>' +
                    repliesHtml +
                    '<div class="reply-input-row" id="replyBox-' + idx + '" style="display:none"><input class="reply-input" placeholder="Reply..." id="replyInput-' + idx + '" onkeydown="if(event.key===\'Enter\')sendReply(' + idx + ')"><button class="reply-send" onclick="sendReply(' + idx + ')">Reply</button></div>' +
                '</div>';
            }).join('');
        }

        function submitPost() {
            if (!checkName()) return;
            var input = document.getElementById('composeInput');
            var text = input.value.trim();
            if (!text) return;
            if (text.length > 1000) { toast('Post too long (max 1000 chars)'); return; }
            var post = { id: 'p_' + Date.now().toString(36) + Math.random().toString(36).slice(2,5), name: me.name, userId: me.id, text: text, time: new Date().toISOString(), likes: [], replies: [] };
            posts.unshift(post);
            saveFeed(); renderFeed();
            input.value = ''; input.style.height = 'auto';
            if (realtimeReady && window.Realtime) window.Realtime.send('new-post', post);
            // Bridge to Telegram
            fetch(TG_API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, senderName: me.name })
            }).catch(function(){});
        }

        function toggleLike(idx) {
            if (!checkName()) return;
            var p = posts[idx]; if (!p) return;
            if (!p.likes) p.likes = [];
            var i = p.likes.indexOf(me.id);
            if (i >= 0) p.likes.splice(i, 1); else p.likes.push(me.id);
            saveFeed(); renderFeed();
            if (realtimeReady && window.Realtime) window.Realtime.send('like', { idx: idx, likes: p.likes });
        }

        function toggleReplyBox(idx) {
            var box = document.getElementById('replyBox-' + idx);
            box.style.display = box.style.display === 'none' ? 'flex' : 'none';
            if (box.style.display === 'flex') document.getElementById('replyInput-' + idx).focus();
        }

        function sendReply(idx) {
            if (!checkName()) return;
            var input = document.getElementById('replyInput-' + idx);
            var text = input.value.trim();
            if (!text) return;
            var p = posts[idx]; if (!p) return;
            if (!p.replies) p.replies = [];
            var reply = { name: me.name, userId: me.id, text: text, time: new Date().toISOString() };
            p.replies.push(reply);
            saveFeed(); renderFeed();
            if (realtimeReady && window.Realtime) window.Realtime.send('new-reply', { idx: idx, reply: reply });
        }

        // --- REALTIME ---
        async function connectRealtime() {
            if (!window.Realtime) return;
            try {
                await window.Realtime.connect('clawsnet-community');
                realtimeReady = true;
                if (me) window.Realtime.setMyState({ name: me.name, id: me.id });
                window.Realtime.on('new-post', function(data) {
                    if (data.userId === me.id) return;
                    posts.unshift(data);
                    renderFeed();
                });
                window.Realtime.on('like', function(data) {
                    if (posts[data.idx]) { posts[data.idx].likes = data.likes; renderFeed(); }
                });
                window.Realtime.on('new-reply', function(data) {
                    if (data.reply.userId === me.id) return;
                    if (posts[data.idx]) { if (!posts[data.idx].replies) posts[data.idx].replies = []; posts[data.idx].replies.push(data.reply); renderFeed(); }
                });
                window.Realtime.onJoin(function() { renderOnline(); });
                window.Realtime.onLeave(function() { renderOnline(); });
                renderOnline();
            } catch(e) {}
        }

        function renderOnline() {
            if (!window.Realtime) { document.getElementById('onlineBar').innerHTML = ''; return; }
            var players = window.Realtime.getPlayers() || [];
            document.getElementById('onlineBar').innerHTML = players.map(function(p) {
                var name = (p.name || p.id || '?');
                return '<div class="online-dot"><div class="online-dot-avatar">' + escapeHtml(getInitials(name)) + '</div><div class="online-dot-name">' + escapeHtml(name) + '</div></div>';
            }).join('');
        }

        // --- INIT ---
        async function waitForAppDB() {
            if (window.AppDB) return true;
            return new Promise(function(resolve) {
                var t = setInterval(function() { if (window.AppDB) { clearInterval(t); resolve(true); } }, 100);
                setTimeout(function() { clearInterval(t); resolve(false); }, 8000);
            });
        }

        async function init() {
            checkName();
            await waitForAppDB();
            if (me && window.AppDB) {
                try {
                    var cloudUser = await window.AppDB.get('clawsnet_user');
                    if (cloudUser && cloudUser.name && !me) { me = cloudUser; saveUser(); checkName(); }
                } catch(e) {}
            }
            await loadFeed();
            connectRealtime();
            // Auto-refresh feed every 30s
            setInterval(function() { loadFeed(); }, 30000);
            // Save on close
            window.addEventListener('beforeunload', function() {
                if (window.AppDB) window.AppDB.setGlobal(GLOBAL_FEED_KEY, posts).catch(function(){});
            });
        }

        document.getElementById('nameInput').addEventListener('keydown', function(e) { if (e.key === 'Enter') saveName(); });
        init();
    </script>
</body>
</html>
