<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Promoter - Post to All Platforms</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: #06060b;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 50%, rgba(168, 85, 247, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 0;
        }

        header h1 {
            font-size: 3em;
            margin-bottom: 12px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #c77dff 0%, #e0aaff 50%, #b366ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #999;
            font-size: 1.05em;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
            margin-bottom: 40px;
        }

        .post-section {
            background: rgba(15, 10, 30, 0.5);
            border: 1px solid rgba(199, 125, 255, 0.15);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }

        .post-section:hover {
            border-color: rgba(199, 125, 255, 0.25);
            background: rgba(15, 10, 30, 0.6);
        }

        .post-section h2 {
            font-size: 1.5em;
            margin-bottom: 25px;
            color: #e0aaff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        textarea {
            width: 100%;
            height: 220px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(199, 125, 255, 0.2);
            border-radius: 14px;
            padding: 18px;
            color: #e2e8f0;
            font-family: 'Nunito', sans-serif;
            font-size: 1em;
            line-height: 1.6;
            resize: vertical;
            margin-bottom: 18px;
            transition: all 0.3s ease;
        }

        textarea::placeholder {
            color: #666;
            font-weight: 400;
        }

        textarea:focus {
            outline: none;
            border-color: #c77dff;
            background: rgba(199, 125, 255, 0.08);
            box-shadow: 0 0 30px rgba(199, 125, 255, 0.15),
                        inset 0 0 20px rgba(199, 125, 255, 0.05);
        }

        .char-count {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
            text-align: right;
        }

        .char-count.warning {
            color: #ff9500;
        }

        .char-count.danger {
            color: #ef4444;
        }

        .post-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #c77dff 0%, #e0aaff 100%);
            border: none;
            border-radius: 14px;
            color: #000;
            font-size: 1em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 0 4px 15px rgba(199, 125, 255, 0.3);
        }

        .post-button:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(199, 125, 255, 0.5);
        }

        .post-button:active:not(:disabled) {
            transform: translateY(-1px);
        }

        .post-button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }

        .platforms-sidebar {
            background: rgba(15, 10, 30, 0.5);
            border: 1px solid rgba(199, 125, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(20px);
            height: fit-content;
            position: sticky;
            top: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }

        .platforms-sidebar h3 {
            margin-bottom: 22px;
            color: #e0aaff;
            font-size: 1.25em;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .platform-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .platform-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(199, 125, 255, 0.15);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .platform-item:hover {
            background: rgba(199, 125, 255, 0.08);
            border-color: rgba(199, 125, 255, 0.35);
            transform: translateX(4px);
        }

        .platform-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .platform-icon {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3em;
        }

        .platform-name {
            font-weight: 500;
            font-size: 0.95em;
        }

        .status-badge {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #666;
            transition: all 0.3s ease;
        }

        .status-badge.connected {
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
        }

        .disconnect-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2em;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .platform-item:hover .disconnect-btn {
            opacity: 1;
        }

        .disconnect-btn:hover {
            transform: scale(1.2);
        }

        .platforms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(199, 125, 255, 0.2);
        }

        .platform-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(199, 125, 255, 0.15);
            border-radius: 16px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .platform-card:hover {
            border-color: rgba(199, 125, 255, 0.4);
            background: rgba(199, 125, 255, 0.08);
            transform: translateY(-6px);
            box-shadow: 0 12px 35px rgba(199, 125, 255, 0.2);
        }

        .platform-card.connected {
            border-color: rgba(0, 208, 132, 0.5);
            background: rgba(0, 208, 132, 0.08);
        }

        .platform-card.connected:hover {
            border-color: rgba(0, 208, 132, 0.8);
            background: rgba(0, 208, 132, 0.15);
        }

        .platform-card-icon {
            font-size: 2.8em;
            margin-bottom: 12px;
            display: inline-block;
        }

        .platform-card-name {
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.95em;
            letter-spacing: -0.3px;
        }

        .platform-card-status {
            font-size: 0.8em;
            color: #777;
            font-weight: 500;
            text-transform: capitalize;
        }

        .platform-card.connected .platform-card-status {
            color: #10b981;
            font-weight: 600;
        }

        .auth-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .auth-modal.show {
            display: flex;
        }

        .auth-modal-content {
            background: linear-gradient(135deg, #1a0a2e, #2d1b4e);
            border: 1px solid rgba(199, 125, 255, 0.3);
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .auth-modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .auth-modal-icon {
            font-size: 2.5em;
        }

        .auth-modal h2 {
            color: #c77dff;
            font-size: 1.5em;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-weight: 500;
            color: #c77dff;
            font-size: 0.9em;
        }

        .form-group input {
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(199, 125, 255, 0.3);
            border-radius: 10px;
            color: #e2e8f0;
            font-family: 'Nunito', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c77dff;
            background: rgba(199, 125, 255, 0.1);
            box-shadow: 0 0 15px rgba(199, 125, 255, 0.2);
        }

        .auth-guide {
            background: rgba(168, 85, 247, 0.06);
            border: 1px solid rgba(168, 85, 247, 0.18);
            border-radius: 10px;
            margin-bottom: 18px;
            overflow: hidden;
        }
        .auth-guide-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 14px; cursor: pointer; user-select: none;
            font-weight: 700; font-size: 0.88em; color: #c084fc;
            transition: background 0.2s;
        }
        .auth-guide-header:hover { background: rgba(168, 85, 247, 0.1); }
        .auth-guide-arrow { transition: transform 0.2s; font-size: 1.1em; }
        .auth-guide.collapsed .auth-guide-arrow { transform: rotate(-90deg); }
        .auth-guide.collapsed .auth-guide-steps { display: none; }
        .auth-guide-steps {
            padding: 0 14px 14px 30px;
            margin: 0; font-size: 0.82em; color: #94a3b8;
            line-height: 1.8; list-style: decimal;
        }
        .auth-guide-steps li { padding: 2px 0; }
        .auth-guide-steps li strong { color: #e2e8f0; }
        .auth-guide-link {
            display: block; margin: 0 14px 14px; padding: 10px 14px;
            background: rgba(168, 85, 247, 0.12); border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px; color: #c084fc; font-weight: 700; font-size: 0.85em;
            text-decoration: none; text-align: center; transition: all 0.2s ease;
        }
        .auth-guide-link:hover { background: rgba(168, 85, 247, 0.22); border-color: rgba(168, 85, 247, 0.5); }

        .auth-modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a855f7, #a855f7);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #e2e8f0;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(168, 85, 247, 0.1);
            border-color: rgba(168, 85, 247, 0.4);
        }

        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(6, 6, 11, 0.95);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 16px 20px;
            max-width: 350px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideInUp 0.3s ease;
            z-index: 2000;
            font-size: 0.9em;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .notification.success {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .notification.success::before { content: '✓'; color: #10b981; font-weight: bold; margin-right: 10px; }
        .notification.error { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
        .notification.error::before { content: '✕'; color: #ef4444; font-weight: bold; margin-right: 10px; }
        .notification.info { border-color: #a855f7; background: rgba(168, 85, 247, 0.1); }
        .notification.info::before { content: 'ℹ'; color: #a855f7; font-weight: bold; margin-right: 10px; }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #888;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            color: #e2e8f0;
            transform: rotate(90deg);
        }

        .posting-status {
            display: none;
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(168, 85, 247, 0.2));
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .posting-status.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
        }

        .status-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
        }

        .status-indicator.pending {
            background: #ff9500;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-indicator.success {
            background: #10b981;
        }

        .status-indicator.error {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .platforms-sidebar {
                position: static;
            }

            header h1 {
                font-size: 1.8em;
            }

            .platforms-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .auth-modal-content {
                padding: 30px 20px;
            }

            .notification {
                right: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>⚡ Power Promoter</h1>
            <p>Post to all your social media platforms simultaneously</p>
        </header>

        <div class="main-content">
            <div class="post-section">
                <h2>Compose Your Post</h2>
                <textarea id="postContent" placeholder="What's on your mind? Write your post here and share it across all connected platforms..."></textarea>
                <div class="char-count">
                    <span id="charCount">0</span> / <span id="maxChar">280</span> characters
                </div>
                <button class="post-button" id="postBtn" onclick="publishPost()">
                    Share to All Platforms
                </button>
                <div class="posting-status" id="postingStatus"></div>
            </div>

            <div class="platforms-sidebar">
                <h3>Connected Platforms</h3>
                <div class="platform-list" id="platformList"></div>
            </div>
        </div>

        <div class="post-section">
            <h2>Connect Your Accounts</h2>
            <div class="platforms-grid" id="platformsGrid"></div>
        </div>
    </div>

    <!-- Auth Modal -->
    <div class="auth-modal" id="authModal">
        <div class="auth-modal-content">
            <button class="close-btn" onclick="closeAuthModal()">✕</button>
            <div class="auth-modal-header">
                <span class="auth-modal-icon" id="authModalIcon"></span>
                <h2 id="authModalTitle">Connect</h2>
            </div>
            <div class="auth-form" id="authForm"></div>
        </div>
    </div>

    <script>
        // DB wrapper — AppDB with localStorage fallback
        const DB = {
            async get(key) {
                try { if (window.AppDB) return await window.AppDB.get(key); } catch(e) {}
                try { const v = localStorage.getItem('pp_'+key); return v ? JSON.parse(v) : null; } catch(e) { return null; }
            },
            async set(key, val) {
                try { if (window.AppDB) { await window.AppDB.set(key, val); return; } } catch(e) {}
                try { localStorage.setItem('pp_'+key, JSON.stringify(val)); } catch(e) {}
            }
        };

        // Platform configurations
        const PLATFORMS = {
            twitter: {
                name: 'Twitter / X',

                color: '#000000',
                fields: ['username', 'apiKey'],
                labels: ['Username', 'API Key'],

            },

                labels: ['Username', 'API Key'],
                maxChars: 2200,

                ],
                link: { label: 'Open Facebook Developer Portal', url: 'https://developers.facebook.com/apps/' }
            },
            tiktok: {

            },

                fields: ['profileId', 'accessToken'],

                maxChars: 3000,
                guide: [
                    'Go to <strong>linkedin.com/developers</strong> and sign in',

            },
            threads: {
                name: 'Threads',
                icon: '@',

                labels: ['Username', 'API Key'],

            bluesky: {
                name: 'Bluesky',
                icon: '🦋',
                color: '#1185fe',
                fields: ['handle', 'password'],
                labels: ['Handle (e.g. you.bsky.social)', 'App Password'],
                maxChars: 300,
                guide: [

        let connectedPlatforms = {};
        let currentAuthPlatform = null;

        // Initialize app
        async function init() {
            await loadConnectedPlatforms();
            renderPlatformsGrid();
            renderPlatformList();
            setupTextareaListener();
        }

        async function loadConnectedPlatforms() {
            const stored = await DB.get('connectedPlatforms');
            if (stored) connectedPlatforms = stored;
        }

        async function saveConnectedPlatforms() {
            await DB.set('connectedPlatforms', connectedPlatforms);
        }

        // Render platforms grid
        function renderPlatformsGrid() {
            const grid = document.getElementById('platformsGrid');
            grid.innerHTML = '';
            
            Object.entries(PLATFORMS).forEach(([key, platform]) => {
                const isConnected = !!connectedPlatforms[key];
                const card = document.createElement('div');
                card.className = `platform-card ${isConnected ? 'connected' : ''}`;
                card.onclick = () => openAuthModal(key);
                card.innerHTML = `
                    <div class="platform-card-icon">${platform.icon}</div>
                    <div class="platform-card-name">${platform.name}</div>
                    <div class="platform-card-status">${isConnected ? 'Connected' : 'Connect'}</div>
                `;
                grid.appendChild(card);
            });
        }

        // Render platform list in sidebar
        function renderPlatformList() {
            const list = document.getElementById('platformList');
            list.innerHTML = '';
            
            const connected = Object.entries(connectedPlatforms).map(([key, data]) => {
                const platform = PLATFORMS[key];
                const item = document.createElement('div');
                item.className = 'platform-item';
                item.innerHTML = `
                    <div class="platform-info">
                        <div class="platform-icon" style="background: ${platform.color}20;">${platform.icon}</div>
                        <div class="platform-name">${platform.name}</div>
                    </div>
                    <div class="status-badge connected"></div>
                    <button class="disconnect-btn" onclick="disconnectPlatform('${key}')">✕</button>
                `;
                list.appendChild(item);
            });

            if (Object.keys(connectedPlatforms).length === 0) {
                list.innerHTML = '<div style="color:#64748b;text-align:center;padding:20px;font-size:0.9em;">No platforms connected yet</div>';
            }
        }

        // Open authentication modal
        function openAuthModal(platformKey) {
            currentAuthPlatform = platformKey;
            const platform = PLATFORMS[platformKey];
            const modal = document.getElementById('authModal');
            const icon = document.getElementById('authModalIcon');
            const title = document.getElementById('authModalTitle');
            const form = document.getElementById('authForm');

            icon.textContent = platform.icon;
            title.textContent = `Connect ${platform.name}`;

            form.innerHTML = '';

            // Guide section
            if (platform.guide && platform.guide.length) {
                const guideEl = document.createElement('div');
                guideEl.className = 'auth-guide';
                guideEl.innerHTML = `
                    <div class="auth-guide-header" onclick="this.parentElement.classList.toggle('collapsed')">
                        <span>How to get your credentials</span>
                        <span class="auth-guide-arrow">▾</span>
                    </div>
                    <ol class="auth-guide-steps">
                        ${platform.guide.map(step => `<li>${step}</li>`).join('')}
                    </ol>
                    ${platform.link ? `<a href="${platform.link.url}" target="_blank" rel="noopener" class="auth-guide-link">${platform.link.label} ↗</a>` : ''}
                `;
                form.appendChild(guideEl);
            }

            platform.fields.forEach((field, idx) => {
                const group = document.createElement('div');
                group.className = 'form-group';
                const inputType = platform.labels[idx].toLowerCase().includes('password') ? 'password' : 'text';
                group.innerHTML = `
                    <label for="${field}">${platform.labels[idx]}</label>
                    <input type="${inputType}" id="${field}" placeholder="Enter your ${platform.labels[idx].toLowerCase()}">
                `;
                form.appendChild(group);
            });

            const buttons = document.createElement('div');
            buttons.className = 'auth-modal-buttons';
            buttons.innerHTML = `
                <button class="btn btn-primary" onclick="confirmAuth()">Connect</button>
                <button class="btn btn-secondary" onclick="closeAuthModal()">Cancel</button>
            `;
            form.appendChild(buttons);

            modal.classList.add('show');
        }

        // Close auth modal
        function closeAuthModal() {
            document.getElementById('authModal').classList.remove('show');
            currentAuthPlatform = null;
        }

        // Confirm authentication
        async function confirmAuth() {
            if (!currentAuthPlatform) return;

            const platform = PLATFORMS[currentAuthPlatform];
            const credentials = {};

            platform.fields.forEach(field => {
                const value = document.getElementById(field)?.value;
                if (!value) {
                    showNotification('Please fill in all fields', 'error');
                    return;
                }
                credentials[field] = value;
            });

            connectedPlatforms[currentAuthPlatform] = credentials;
            await saveConnectedPlatforms();

            showNotification(`${platform.name} connected successfully!`, 'success');
            renderPlatformsGrid();
            renderPlatformList();
            closeAuthModal();
        }

        // Disconnect platform
        async function disconnectPlatform(platformKey) {
            delete connectedPlatforms[platformKey];
            await saveConnectedPlatforms();
            showNotification(`${PLATFORMS[platformKey].name} disconnected`, 'info');
            renderPlatformsGrid();
            renderPlatformList();
        }

        // Setup textarea listener
        function setupTextareaListener() {
            const textarea = document.getElementById('postContent');
            textarea.addEventListener('input', (e) => {
                const length = e.target.value.length;
                const charCount = document.getElementById('charCount');
                charCount.textContent = length;

                const shortestMax = Math.min(
                    ...Object.entries(connectedPlatforms).map(([key]) => PLATFORMS[key].maxChars)
                ) || 280;

                const countEl = charCount.parentElement;
                if (length > shortestMax) {
                    countEl.classList.add('danger');
                    countEl.classList.remove('warning');
                } else if (length > shortestMax * 0.8) {
                    countEl.classList.add('warning');
                    countEl.classList.remove('danger');
                } else {
                    countEl.classList.remove('warning', 'danger');
                }
            });
        }

        // Publish post
        async function publishPost() {
            let content = document.getElementById('postContent').value.trim();

            if (!content) {
                showNotification('Please write something to post', 'error');
                return;
            }

            // Add unremovable footer
            content += '\n\nposted from Inclawbate.com';

            if (Object.keys(connectedPlatforms).length === 0) {
                showNotification('Please connect at least one platform', 'error');
                return;
            }

            const postBtn = document.getElementById('postBtn');
            postBtn.disabled = true;

            const status = document.getElementById('postingStatus');
            status.classList.add('show');
            status.innerHTML = '';

            const results = {};

            for (const [platformKey] of Object.entries(connectedPlatforms)) {
                results[platformKey] = { status: 'pending' };
                updatePostingStatus(results);
            }

            // Simulate posting to each platform
            for (const [platformKey, credentials] of Object.entries(connectedPlatforms)) {
                try {
                    // Simulate API call with delay
                    await new Promise(resolve => setTimeout(resolve, 800 + Math.random() * 400));
                    results[platformKey] = { status: 'success' };
                } catch (error) {
                    results[platformKey] = { status: 'error', error: error.message };
                }
                updatePostingStatus(results);
            }

            showNotification('Posted to all platforms successfully!', 'success');
            document.getElementById('postContent').value = '';
            document.getElementById('charCount').textContent = '0';
            
            setTimeout(() => {
                status.classList.remove('show');
                postBtn.disabled = false;
            }, 2000);
        }

        // Update posting status display
        function updatePostingStatus(results) {
            const status = document.getElementById('postingStatus');
            status.innerHTML = '';

            Object.entries(results).forEach(([platformKey, result]) => {
                const platform = PLATFORMS[platformKey];
                const item = document.createElement('div');
                item.className = 'status-item';

                let indicatorClass = result.status;
                let statusText = result.status.charAt(0).toUpperCase() + result.status.slice(1);
                if (result.status === 'error') {
                    statusText = 'Failed: ' + result.error;
                }

                item.innerHTML = `
                    <div class="status-indicator ${indicatorClass}">
                        ${result.status === 'pending' ? '⏳' : result.status === 'success' ? '✓' : '✕'}
                    </div>
                    <span>${platform.name}: ${statusText}</span>
                `;
                status.appendChild(item);
            });
        }

        // Show notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            
            const closeBtn = document.createElement('button');
            closeBtn.className = 'close-btn';
            closeBtn.textContent = '✕';
            closeBtn.onclick = () => notification.remove();
            notification.appendChild(closeBtn);

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 5000);
        }

        // Initialize app on load
        window.addEventListener('load', init);
    </script>
